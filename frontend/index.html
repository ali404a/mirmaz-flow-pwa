<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mirmaz FLOW</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2563EB">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* ===== الأزرق الأساسي ===== */
  --blue-700:#1D4ED8;--blue-600:#2563EB;--blue-500:#3B6FF0;--blue-400:#6090F5;--blue-300:#9DBBFA;--blue-100:#DCE7FD;--blue-50:#EFF4FE;
  --blue-grad:linear-gradient(135deg,#4C86F7 0%,#2563EB 55%,#1D4ED8 100%);
  --blue-grad-soft:linear-gradient(135deg,#EFF4FE,#DCE7FD);
  /* ===== الحبر ===== */
  --ink-900:#0E1526;--ink-800:#16203A;--ink-700:#222C42;--ink-600:#3A4866;--ink-500:#5A6783;--ink-400:#8A95AC;--ink-300:#B4BDD0;--ink-200:#D9DFEA;
  /* ===== الأسطح (خلفية بيضاء نظيفة) ===== */
  --bg:#F6F8FC;--surface:#FFFFFF;--surface-2:#F7F9FD;--surface-3:#F1F5FB;--line:#E8EDF6;--line-2:#DCE3F0;
  /* ===== الحالات ===== */
  --green-ok:#16B981;--green-soft:#E7F8F1;--amber:#F59E0B;--amber-soft:#FEF4E2;--red:#F43F5E;--red-soft:#FEE9EC;
  --violet:#7C5CFC;--violet-soft:#EFEAFE;--cyan:#0EA5E9;--cyan-soft:#E5F4FD;
  --academy:#2563EB;--academy-soft:#DCE7FD;--zone:#7C3AED;--zone-soft:#EDE5FE;--tick:#F97316;--tick-soft:#FFEDD5;
  /* ===== الاستدارة ===== */
  --r-xs:8px;--r-sm:12px;--r-md:16px;--r-lg:22px;--r-xl:28px;
  /* ===== الظلال (طبقات متدرجة) ===== */
  --shadow-xs:0 1px 2px rgba(16,32,70,.04);
  --shadow-sm:0 1px 3px rgba(16,32,70,.05),0 1px 2px rgba(16,32,70,.03);
  --shadow-md:0 8px 24px rgba(16,32,70,.07),0 2px 6px rgba(16,32,70,.04);
  --shadow-lg:0 24px 56px rgba(16,32,70,.13),0 6px 16px rgba(16,32,70,.06);
  --shadow-blue:0 10px 26px rgba(37,99,235,.26);
  --shadow-blue-lg:0 16px 40px rgba(37,99,235,.34);
  /* ===== الزجاج اللامع (الثيم الأساسي) ===== */
  --glass-bg:linear-gradient(152deg,rgba(255,255,255,.97) 0%,rgba(250,252,255,.90) 50%,rgba(244,248,254,.86) 100%);
  --glass-line:rgba(255,255,255,.85);
  --glass-shadow:0 4px 22px rgba(16,32,70,.06),inset 0 1px 0 rgba(255,255,255,1),inset 0 -1px 0 rgba(220,231,253,.5);
  --glass-shadow-hover:0 16px 42px rgba(16,32,70,.12),inset 0 1px 0 rgba(255,255,255,1);
  --sheen:linear-gradient(110deg,transparent 15%,rgba(255,255,255,.55) 50%,transparent 85%);
  --ease:cubic-bezier(.2,.7,.2,1);--ease-bounce:cubic-bezier(.34,1.56,.64,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Cairo',system-ui,sans-serif;background:var(--bg);color:var(--ink-900);direction:rtl;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{text-decoration:none;color:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#D4DCEA;border-radius:20px}
::-webkit-scrollbar-track{background:transparent}
.ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.ambient span{position:absolute;border-radius:50%;filter:blur(72px);opacity:.34;animation:float 20s ease-in-out infinite}
.ambient span:nth-child(1){width:460px;height:460px;background:#C7D9FF;top:-140px;right:-90px}
.ambient span:nth-child(2){width:380px;height:380px;background:#E4D8FF;bottom:-130px;left:6%;animation-delay:-6s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,30px) scale(1.08)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.glass{background:var(--glass-bg);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);border:1px solid var(--glass-line)}
.fade-up{animation:fadeUp .45s cubic-bezier(.2,.7,.2,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.shell{display:flex;height:100vh;position:relative;z-index:1;gap:0}
.sidebar{width:248px;flex-shrink:0;display:flex;flex-direction:column;padding:22px 16px 80px;height:100vh;overflow-y:auto;overflow-x:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(248,251,255,.94));
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-left:1px solid var(--line);box-shadow:inset 1px 0 0 rgba(255,255,255,.9)}
.sb-logo{display:flex;align-items:center;gap:11px;padding:6px 10px 22px;justify-content:flex-end}
.sb-logo-text{text-align:right;line-height:1.1}
.sb-logo-text b{font-size:19px;font-weight:800;display:block}
.sb-logo-text span{font-size:11px;color:var(--ink-400);font-weight:600;letter-spacing:2px}
.logo-mark{width:42px;height:42px;border-radius:13px;background:var(--blue-grad);color:#fff;display:grid;place-items:center;
  box-shadow:var(--shadow-blue),inset 0 1px 0 rgba(255,255,255,.35);position:relative;overflow:hidden}
.logo-mark::before{content:"";position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.3),transparent)}
.logo-mark svg{width:26px;height:26px}
.sb-nav{display:flex;flex-direction:column;gap:4px;flex:1;margin-top:8px}
.sb-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;color:var(--ink-500);font-size:14px;font-weight:700;transition:all .18s;text-align:right}
.sb-btn svg{width:20px;height:20px;flex-shrink:0}
.sb-btn:hover{background:linear-gradient(165deg,#fff,var(--surface-3));color:var(--ink-900);box-shadow:var(--shadow-xs)}
.sb-btn.on{background:var(--blue-grad);color:#fff;box-shadow:var(--shadow-blue),inset 0 1px 0 rgba(255,255,255,.3)}
.sb-btn.on .ico{filter:drop-shadow(0 1px 2px rgba(0,0,0,.2))}
.sb-summary{margin-top:14px;border-radius:var(--r-md);padding:16px}
.sb-summary h5{font-size:11px;font-weight:700;color:var(--ink-400);margin-bottom:12px;text-align:right}
.sb-sum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.sb-sum-row:last-child{margin-bottom:0}
.sb-sum-row span{font-size:12px;color:var(--ink-500);font-weight:600}
.sb-sum-row b{font-size:14px;font-weight:800}
.sb-sum-bar{height:6px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:10px}
.sb-sum-fill{height:100%;border-radius:6px;background:var(--blue-grad);transition:width .6s}


.main{flex:1;display:flex;flex-direction:column;gap:0;min-width:0;height:100vh}
.topbar{height:74px;flex-shrink:0;display:flex;align-items:center;gap:18px;padding:0 26px;
  background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(250,252,255,.88));
  backdrop-filter:blur(18px) saturate(1.3);-webkit-backdrop-filter:blur(18px) saturate(1.3);
  border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(255,255,255,.9),0 4px 20px rgba(16,32,70,.03)}
.role-switch{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:11px}
.role-switch button{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:700;color:var(--ink-400);transition:all .2s}
.role-switch button.on{background:var(--blue-grad);color:#fff;box-shadow:var(--shadow-sm)}
.searchbar{flex:1;max-width:380px;height:42px;display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--surface-2);border-radius:13px;color:var(--ink-400);border:1px solid transparent;transition:all .2s}
.searchbar:focus-within{border-color:var(--blue-300);background:#fff}
.searchbar input{flex:1;border:none;outline:none;background:none;font-size:13.5px;color:var(--ink-900)}
.top-actions{display:flex;align-items:center;gap:12px;margin-right:auto}
.icon-btn{position:relative;width:42px;height:42px;border-radius:12px;display:grid;place-items:center;color:var(--ink-500);
  background:linear-gradient(165deg,#fff,var(--surface-3));border:1px solid var(--line);
  box-shadow:var(--shadow-xs),inset 0 1px 0 rgba(255,255,255,1);transition:all .22s var(--ease)}
.icon-btn:hover{background:var(--blue-grad-soft);color:var(--blue-600);border-color:var(--blue-100);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.icon-btn .dot{position:absolute;top:7px;right:8px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--red);color:#fff;font-size:9px;font-weight:800;display:grid;place-items:center;border:2px solid #fff}
.me{display:flex;align-items:center;gap:10px;padding:5px 6px 5px 12px;border-radius:13px;flex-direction:row-reverse;
  background:linear-gradient(165deg,#fff,var(--surface-3));border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,1)}
.me-av{width:38px;height:38px;border-radius:11px;background:var(--blue-grad);color:#fff;display:grid;place-items:center;font-weight:700;
  box-shadow:0 4px 12px rgba(37,99,235,.28),inset 0 1px 0 rgba(255,255,255,.3)}
.me-info{display:flex;flex-direction:column;line-height:1.3;text-align:right}
.me-info b{font-size:13px}.me-info span{font-size:11px;color:var(--ink-400)}
.content{flex:1;overflow-y:auto;padding:26px}
.page-title{font-size:25px;font-weight:800;margin-bottom:5px}
.page-sub{font-size:13.5px;color:var(--ink-400);margin-bottom:22px}

/* ===== الأزرار — زجاج لامع بطبقات ===== */
.pill-blue{position:relative;height:44px;padding:0 20px;border-radius:14px;background:var(--blue-grad);color:#fff;font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:7px;overflow:hidden;
  box-shadow:var(--shadow-blue),inset 0 1px 0 rgba(255,255,255,.32),inset 0 -2px 6px rgba(0,0,0,.10);
  transition:transform .22s var(--ease),box-shadow .22s var(--ease),filter .22s}
.pill-blue::before{content:"";position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,0));pointer-events:none}
.pill-blue::after{content:"";position:absolute;top:0;left:-130%;width:60%;height:100%;background:var(--sheen);transform:skewX(-18deg);transition:left .7s var(--ease);pointer-events:none}
.pill-blue:hover{transform:translateY(-2px);box-shadow:var(--shadow-blue-lg),inset 0 1px 0 rgba(255,255,255,.4)}
.pill-blue:hover::after{left:150%}
.pill-blue:active{transform:translateY(0);filter:saturate(1.1) brightness(.96)}
.pill-blue:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none;filter:grayscale(.3)}
.pill-blue>*{position:relative;z-index:1}

.pill-ghost{height:44px;padding:0 18px;border-radius:14px;
  background:linear-gradient(165deg,rgba(255,255,255,.98),rgba(246,249,254,.9));
  border:1px solid var(--line-2);font-weight:600;font-size:13px;color:var(--ink-700);
  box-shadow:var(--shadow-sm),inset 0 1px 0 rgba(255,255,255,1);
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  transition:all .22s var(--ease)}
.pill-ghost:hover{border-color:var(--blue-300);color:var(--blue-600);transform:translateY(-1px);box-shadow:var(--shadow-md)}

.btn-sm{position:relative;height:36px;padding:0 14px;border-radius:11px;font-size:12.5px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;overflow:hidden;
  border:1px solid transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
  transition:all .22s var(--ease)}
.btn-sm:hover{transform:translateY(-1px)}
.btn-sm:active{transform:translateY(0)}
.btn-green{background:linear-gradient(165deg,#EAFBF4,var(--green-soft));color:var(--green-ok);border-color:rgba(22,185,129,.2)}
.btn-green:hover{background:linear-gradient(135deg,#1FD196,var(--green-ok));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(22,185,129,.3)}
.btn-red{background:linear-gradient(165deg,#FEF0F3,var(--red-soft));color:var(--red);border-color:rgba(244,63,94,.2)}
.btn-red:hover{background:linear-gradient(135deg,#FB5B75,var(--red));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(244,63,94,.3)}
.btn-amber{background:linear-gradient(165deg,#FEF8EC,var(--amber-soft));color:#B45309;border-color:rgba(245,158,11,.22)}
.btn-amber:hover{background:linear-gradient(135deg,#FBB03B,var(--amber));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(245,158,11,.3)}
.btn-blue{background:linear-gradient(165deg,#F5F8FE,var(--blue-50));color:var(--blue-600);border-color:rgba(37,99,235,.16)}
.btn-blue:hover{background:var(--blue-grad);color:#fff;border-color:transparent;box-shadow:var(--shadow-blue)}
.btn-gray{background:linear-gradient(165deg,#FAFBFD,var(--surface-3));color:var(--ink-500);border-color:var(--line)}
.btn-gray:hover{background:var(--ink-600);color:#fff;border-color:transparent}

.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;white-space:nowrap;
  border:1px solid rgba(255,255,255,.55);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 1px 2px rgba(16,32,70,.04);line-height:1}
.chip .ico{opacity:.9}
.chip-crit{background:linear-gradient(135deg,#FB5B75,var(--red));color:#fff;border-color:transparent;
  box-shadow:0 4px 12px rgba(244,63,94,.34),inset 0 1px 0 rgba(255,255,255,.28);
  animation:badgePulse 1.6s ease-in-out infinite}
.sep{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--ink-300);vertical-align:middle;margin:0 2px}
@keyframes badgePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.78;transform:scale(1.05)}}
@keyframes critFrame{0%,100%{box-shadow:0 0 0 3px rgba(255,84,112,.12),0 14px 36px rgba(255,84,112,.20)}50%{box-shadow:0 0 0 6px rgba(255,84,112,.05),0 14px 40px rgba(255,84,112,.30)}}

/* ===== الصفحة الرئيسية ===== */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
.stat{background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:18px;box-shadow:var(--shadow-sm);transition:all .2s}
.stat:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-ico{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:19px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 2px 8px rgba(16,32,70,.05);border:1px solid rgba(255,255,255,.6)}
.stat-delta{font-size:11px;font-weight:800;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:3px}
.stat-delta.up{background:var(--green-soft);color:var(--green-ok)}
.stat-delta.down{background:var(--red-soft);color:var(--red)}
.stat b{font-size:26px;font-weight:800;display:block;line-height:1}
.stat span{font-size:12.5px;color:var(--ink-400);font-weight:600}
.home-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:22px}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.panel-head h3{font-size:16px;font-weight:800}
.panel-head .more{font-size:12.5px;font-weight:700;color:var(--blue-600)}
.funnel{display:flex;flex-direction:column;gap:9px}
.fn-row{display:flex;align-items:center;gap:12px}
.fn-bar{flex:1;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:13px;font-weight:700;color:#fff}
.fn-side{width:90px;text-align:left;font-size:12px;color:var(--ink-500);font-weight:700}
.act-list{display:flex;flex-direction:column;gap:4px}
.act{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:11px;transition:background .15s}
.act:hover{background:var(--surface-2)}
.act-ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:15px;flex-shrink:0}
.act-body{flex:1}
.act-body b{font-size:13.5px;font-weight:700;display:block}
.act-body span{font-size:11.5px;color:var(--ink-400)}
.act-time{font-size:11px;color:var(--ink-300);font-weight:600}
.ring-row{display:flex;gap:14px;justify-content:space-around}
.ring{text-align:center}
.ring svg{transform:rotate(-90deg)}
.ring .rval{font-size:18px;font-weight:800}
.ring p{font-size:11.5px;color:var(--ink-400);font-weight:600;margin-top:8px}

.maps-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.maps-count{font-size:15px;color:var(--ink-500);display:flex;align-items:center;gap:12px}
.maps-count strong{font-size:22px;font-weight:800;color:var(--ink-900)}
.crit-tag{font-size:12px;font-weight:800;color:var(--red);background:#FF547014;padding:5px 12px;border-radius:20px}
.maps-grid{display:grid;grid-template-columns:1fr;gap:18px}

.tmap{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);overflow:hidden;border-right:5px solid var(--brand);transition:box-shadow .25s}
.tmap.crit{border:1px solid var(--line);border-right:5px solid var(--red)}
.tmap:hover{box-shadow:var(--shadow-md)}
.tmap-head{display:flex;align-items:flex-start;gap:14px;padding:20px 22px;flex-wrap:wrap}
.tmap-head-main{flex:1;min-width:200px}
.tmap-chips{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.tmap-title{font-size:18px;font-weight:800;margin-bottom:6px}
.tmap-desc{font-size:13px;color:var(--ink-500);line-height:1.6}
.tmap-side{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.tmap-tools{display:flex;gap:6px;margin-top:4px}
.tmap-tool{width:34px;height:34px;border-radius:10px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-500);transition:all .2s}
.tmap-tool.edit:hover{background:var(--blue-grad);color:#fff}
.tmap-tool.postpone:hover{background:var(--amber);color:#fff}
.tmap-tool.del:hover{background:var(--red);color:#fff}
.tmap-due{font-size:12.5px;color:var(--ink-500);font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:6px}
.tmap-coord{font-size:11.5px;color:var(--ink-400)}

.flow{display:flex;align-items:flex-start;gap:0;padding:18px 22px 26px;overflow-x:auto}
.cnode{position:relative;flex-shrink:0;width:118px;display:flex;flex-direction:column;align-items:center;gap:10px}
/* خط الوصل بين الدوائر */
.cnode-line{position:absolute;top:33px;left:0;width:calc(50% - 0px);height:3px;background:var(--line);z-index:0;border-radius:3px;transition:background .4s}
.cnode-line.before{left:auto;right:0}
.cnode-line.done{background:var(--green-ok)}
.cnode:first-child .cnode-line.before{display:none}
.cnode:last-child .cnode-line.after{display:none}

/* الدائرة */
.cnode-circle{position:relative;z-index:2;width:66px;height:66px;border-radius:50%;display:grid;place-items:center;cursor:pointer;
  background:linear-gradient(160deg,#fff,var(--surface-3));border:3px solid var(--line);
  box-shadow:var(--shadow-sm),inset 0 2px 4px rgba(255,255,255,.9);
  transition:all .35s var(--ease-bounce)}
.cnode-circle .cn-ico{color:var(--ink-400);opacity:.5;transition:all .35s}
.cnode-circle .cn-ico svg{width:27px;height:27px}
.cnode-circle .cn-state{position:absolute;bottom:-3px;left:-3px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff;border:2.5px solid #fff;transform:scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.cnode-circle .cn-state svg{width:12px;height:12px;stroke-width:2.5}

/* الحالات: باهت (منجز/منتظر) و بارز (جاري) */
.cnode.done .cnode-circle{border-color:var(--green-ok);background:color-mix(in srgb,var(--green-ok) 8%,#fff)}
.cnode.done .cn-ico{color:var(--c);opacity:.9}
.cnode.done .cn-state{transform:scale(1)}
.cnode.pending .cnode-circle{border-color:var(--line);background:var(--surface-2)}
.cnode.pending .cn-ico{color:var(--ink-300);opacity:.45}

/* الجاري — ملوّن وبارز ونابض */
.cnode.active-stage .cnode-circle{border-color:var(--c);background:color-mix(in srgb,var(--c) 12%,#fff);box-shadow:0 0 0 0 color-mix(in srgb,var(--c) 50%,transparent);animation:cnPulse 1.8s ease-in-out infinite;transform:scale(1.12)}
.cnode.active-stage .cn-ico{color:var(--c);opacity:1;transform:scale(1.08)}
.cnode.active-stage .cn-state{transform:scale(1)}
@keyframes cnPulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--c) 45%,transparent)}70%{box-shadow:0 0 0 14px color-mix(in srgb,var(--c) 0%,transparent)}100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--c) 0%,transparent)}}

/* الرفض */
.cnode.rejected .cnode-circle{border-color:var(--red);background:color-mix(in srgb,var(--red) 10%,#fff);animation:cnShake .5s}
.cnode.rejected .cn-ico{color:var(--red);opacity:1}
.cnode.rejected .cn-state{transform:scale(1)}
@keyframes cnShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* hover + المختار */
.cnode-circle:hover{transform:scale(1.16);border-color:var(--c)}
.cnode.active-stage .cnode-circle:hover{transform:scale(1.2)}
.cnode.opened .cnode-circle{border-color:var(--c);box-shadow:0 8px 22px color-mix(in srgb,var(--c) 30%,transparent)}
.cnode.opened .cn-ico{color:var(--c);opacity:1}

/* الاسم + الشخص */
.cnode-label{text-align:center;display:flex;flex-direction:column;gap:3px;transition:opacity .35s}
.cnode.pending .cnode-label{opacity:.55}
.cnode-name{font-size:11.5px;font-weight:800;color:var(--ink-900);line-height:1.3;max-width:108px}
.cnode-person{font-size:10px;color:var(--ink-400);font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px}
.cnode-person .cn-av{width:15px;height:15px;border-radius:5px;color:#fff;display:grid;place-items:center;font-size:8px;font-weight:800}
.cnode-noperson{font-size:10px;color:var(--ink-300);font-style:italic}

.node-panel{margin:0 22px 22px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:18px;animation:fadeUp .3s both}
.np-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.np-title{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800}
.np-title .dot{width:10px;height:10px;border-radius:50%}
.np-close{width:30px;height:30px;border-radius:9px;background:#fff;display:grid;place-items:center;color:var(--ink-400);font-size:15px}
.np-close:hover{background:#FF547018;color:var(--red)}
.np-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.np-field{flex:1;min-width:180px;display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.np-field label{font-size:12px;font-weight:700;color:var(--ink-500)}
.np-field input,.np-field select,.np-field textarea{border:1.5px solid var(--line);border-radius:11px;padding:10px 12px;font-size:13.5px;color:var(--ink-900);background:#fff;transition:all .2s}
.np-field textarea{min-height:90px;resize:vertical;line-height:1.6}
.np-field input:focus,.np-field select:focus,.np-field textarea:focus{outline:none;border-color:var(--blue-400)}
.np-content{background:#fff;border:1px dashed var(--line);border-radius:11px;padding:13px;font-size:13px;color:var(--ink-600);line-height:1.7;margin-bottom:12px;white-space:pre-wrap}
.np-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--blue-600);background:var(--blue-50);padding:7px 12px;border-radius:10px;margin-top:8px}
.np-actions{display:flex;gap:8px;flex-wrap:wrap}
.np-reject{background:#FF54700a;border:1px solid #FF547030;border-radius:11px;padding:12px;margin-top:10px}
.np-reject label{color:var(--red)}

.mylist{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.myitem{background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:16px;box-shadow:var(--shadow-sm);border-right:4px solid var(--c);transition:all .2s}
.myitem:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.myitem-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.myitem h4{font-size:14.5px;font-weight:800;margin-bottom:4px}
.myitem-task{font-size:12px;color:var(--ink-400);margin-bottom:12px}
.myitem-foot{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--line)}
.empty{padding:50px;text-align:center;color:var(--ink-400);font-size:14px}

.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.set-card{padding:22px}
.set-card h3{font-size:17px;font-weight:800;margin-bottom:4px}
.set-card p{font-size:12.5px;color:var(--ink-400);margin-bottom:16px}
.set-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.set-row{display:flex;align-items:center;gap:10px;background:var(--surface-2);border-radius:12px;padding:10px 14px}
.set-row .ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:14px;flex-shrink:0}
.set-row .nm{flex:1;font-size:13.5px;font-weight:700}
.set-row .rl{font-size:11.5px;color:var(--ink-400);font-weight:500}
.set-del{width:28px;height:28px;border-radius:8px;background:#fff;color:var(--ink-400);display:grid;place-items:center;font-size:14px}
.set-del:hover{background:#FF547018;color:var(--red)}
.set-add{display:flex;gap:8px}
.set-add input,.set-add select{flex:1;height:42px;border:1.5px solid var(--line);border-radius:11px;padding:0 12px;font-size:13px;background:var(--surface-2)}
.set-add input:focus,.set-add select:focus{outline:none;border-color:var(--blue-400);background:#fff}

.ov{position:fixed;inset:0;z-index:100;background:rgba(11,18,32,.42);backdrop-filter:blur(6px);display:grid;place-items:center;padding:20px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:640px;max-height:92vh;overflow-y:auto;background:#fff;border-radius:var(--r-xl);box-shadow:var(--shadow-lg);animation:pop .3s cubic-bezier(.2,.7,.2,1)}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:22px 24px 14px}
.modal-head h2{font-size:19px;font-weight:800}
.modal-close{width:36px;height:36px;border-radius:11px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-500);font-size:18px}
.modal-close:hover{background:#FF547018;color:var(--red)}
.modal-body{padding:4px 24px 8px}
.modal-foot{display:flex;justify-content:space-between;align-items:center;padding:16px 24px 22px;border-top:1px solid var(--line);margin-top:12px}
.fld{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.fld label{font-size:12.5px;font-weight:700;color:var(--ink-500)}
.fld input,.fld select,.fld textarea{height:44px;border:1.5px solid var(--line);border-radius:12px;padding:0 14px;font-size:14px;color:var(--ink-900);background:var(--surface-2);transition:all .2s}
.fld textarea{height:auto;min-height:80px;padding:12px 14px;resize:vertical;line-height:1.6}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--blue-400);background:#fff}
.fld-row{display:flex;gap:12px}
.fld-row .fld{flex:1}

.stage-builder{border:1px solid var(--line);border-radius:var(--r-md);padding:16px;background:var(--surface-2);margin-bottom:14px}
.sb-title{font-size:13px;font-weight:800;color:var(--ink-700);margin-bottom:12px}
.sb-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.sb-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:8px 10px}
.sb-num{width:24px;height:24px;border-radius:7px;background:var(--blue-50);color:var(--blue-600);display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0}
.sb-row select{flex:1;height:38px;border:1px solid var(--line);border-radius:9px;padding:0 10px;font-size:12.5px;background:var(--surface-2);min-width:0}
.sb-row .sb-del{width:30px;height:30px;border-radius:8px;background:var(--surface-2);color:var(--ink-400);display:grid;place-items:center;font-size:14px;flex-shrink:0}
.sb-row .sb-del:hover{background:#FF547018;color:var(--red)}
.sb-add{width:100%;height:40px;border:1.5px dashed var(--blue-300);border-radius:11px;color:var(--blue-600);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.sb-add:hover{background:var(--blue-50)}

.sb-badge{margin-right:auto;background:var(--red);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;padding:0 6px;border-radius:10px;display:grid;place-items:center}
.sb-btn.on .sb-badge{background:#fff;color:var(--blue-600)}

/* التحليلات */
.an-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:16px}
.an-brand{margin-bottom:16px}
.an-brand:last-child{margin-bottom:0}
.an-brand-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.an-brand-top b{font-size:13px;color:var(--ink-600)}
.an-track{height:10px;border-radius:8px;background:var(--surface-2);overflow:hidden}
.an-fill{height:100%;border-radius:8px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
.an-prio{display:flex;justify-content:space-around;align-items:center;padding:10px 0}
.an-prio-item{text-align:center}
.an-prio-ring{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;margin:0 auto 10px;background:conic-gradient(var(--c) calc(var(--pct)*1%),var(--surface-2) 0)}
.an-prio-ring b{width:62px;height:62px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:20px;font-weight:800;color:var(--c)}
.an-prio-item span{font-size:12.5px;font-weight:700;color:var(--ink-600)}
.an-users{display:flex;flex-direction:column;gap:10px}
.an-user{display:flex;align-items:center;gap:12px}
.an-rank{width:26px;height:26px;border-radius:8px;background:var(--surface-2);color:var(--ink-400);display:grid;place-items:center;font-size:12px;font-weight:800;flex-shrink:0}
.an-rank.top{background:var(--amber-soft);color:var(--amber)}
.an-av{width:38px;height:38px;border-radius:11px;color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0}
.an-user-info{width:130px;flex-shrink:0}
.an-user-info b{font-size:13.5px;font-weight:700;display:block}
.an-user-info span{font-size:11px;color:var(--ink-400)}
.an-user-bar{flex:1;height:8px;border-radius:6px;background:var(--surface-2);overflow:hidden}
.an-user-fill{height:100%;border-radius:6px;transition:width .6s}
.an-user-num{font-size:12.5px;font-weight:800;color:var(--ink-600);width:50px;text-align:left;font-family:'IBM Plex Mono',monospace}
.an-states{display:flex;flex-wrap:wrap;gap:12px}
.an-state{flex:1;min-width:110px;background:var(--surface-2);border:1.5px solid var(--line);border-radius:14px;padding:16px;text-align:center}
.an-state b{font-size:26px;font-weight:800;display:block;line-height:1}
.an-state span{font-size:12px;color:var(--ink-400);font-weight:600}

/* الفريق */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.team-card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:20px;transition:all .2s}
.team-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.team-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.team-av{width:48px;height:48px;border-radius:14px;color:#fff;display:grid;place-items:center;font-size:18px;font-weight:700}
.team-info b{font-size:15px;font-weight:800;display:block}
.team-info span{font-size:12px;color:var(--ink-400)}
.team-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.team-stat{text-align:center;background:var(--surface-2);border-radius:11px;padding:10px 4px}
.team-stat b{font-size:18px;font-weight:800;display:block;line-height:1}
.team-stat span{font-size:10.5px;color:var(--ink-400)}
.team-prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12.5px;color:var(--ink-500)}
.team-prog-head b{color:var(--ink-900)}

/* الإشعارات */
.notif-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.notif-list{display:flex;flex-direction:column;gap:10px}
.notif{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:16px 18px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s}
.notif:hover{box-shadow:var(--shadow-md)}
.notif.unread{background:var(--blue-50);border-color:var(--blue-100)}
.notif-ico{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
.notif-body{flex:1}
.notif-body b{font-size:14px;font-weight:800;display:block;margin-bottom:3px}
.notif-body span{font-size:12.5px;color:var(--ink-500)}
.notif-side{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.notif-time{font-size:11px;color:var(--ink-400);font-weight:600}
.notif-dot{width:9px;height:9px;border-radius:50%;background:var(--blue-600)}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--surface);border-top:1px solid var(--line);z-index:90;justify-content:space-around;align-items:center;padding:0 10px;box-shadow:0 -4px 20px rgba(0,0,0,0.05);padding-bottom:env(safe-area-inset-bottom);}
.bn-btn{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink-400);font-size:10px;font-weight:700;position:relative;width:60px;background:none;border:none;cursor:pointer;}
.bn-btn.on{color:var(--blue-600);}
.bn-btn .ico{width:22px;height:22px;}
.bn-badge{position:absolute;top:-4px;right:12px;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:10px;line-height:1;}
@media(max-width:900px){.set-grid,.an-grid,.home-grid{grid-template-columns:1fr}.stat-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .role-switch{display:none}.me-info{display:none}.content{padding:16px;padding-bottom:90px;height:100vh}.bottom-nav{display:flex}
  .sidebar{display:flex;position:fixed;top:0;right:-300px;bottom:0;width:260px;z-index:100;overflow-y:auto;overflow-x:hidden;border-left:none;
    background:linear-gradient(180deg,rgba(255,255,255,.99),rgba(248,251,255,.97));backdrop-filter:blur(22px);
    box-shadow:-8px 0 40px rgba(16,32,70,.16);transition:right .32s var(--ease);
    padding:22px 16px calc(80px + env(safe-area-inset-bottom));}
  .sidebar.open{right:0}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;backdrop-filter:blur(3px)}
  .sidebar-overlay.open{display:block}
}
/* ================================================================
   نظام الزجاج اللامع (Glossy Glass) — الطبقة الموحّدة
   كل بوكس في النظام يمر من هنا. لا !important، لا تكرار.
   ================================================================ */
.glass-card,.stat,.panel,.tmap,.team-card,.notif,.myitem,.pcol,
.cal-grid-card,.cal-day-panel,.chat-side,.chat-main,.set-card,.sb-summary{
  position:relative;
  background:var(--glass-bg);
  backdrop-filter:blur(16px) saturate(1.4);
  -webkit-backdrop-filter:blur(16px) saturate(1.4);
  border:1px solid var(--glass-line);
  box-shadow:var(--glass-shadow);
  overflow:hidden;
  border-radius:var(--r-lg);
}
/* لمعة علوية ثابتة — توهم بانحناء الزجاج */
.glass-card::before,.stat::before,.panel::before,.tmap::before,.team-card::before,
.notif::before,.myitem::before,.pcol::before,.cal-grid-card::before,
.cal-day-panel::before,.set-card::before,.sb-summary::before{
  content:"";position:absolute;top:0;left:0;right:0;height:44%;
  background:linear-gradient(180deg,rgba(255,255,255,.62),rgba(255,255,255,0));
  pointer-events:none;z-index:0;
}
.glass-card>*,.stat>*,.panel>*,.tmap>*,.team-card>*,.notif>*,.myitem>*,
.pcol>*,.set-card>*,.sb-summary>*{position:relative;z-index:1}

/* لمعان عابر عند المرور */
.stat::after,.team-card::after,.myitem::after,.notif::after,.glossy::after{
  content:"";position:absolute;top:0;left:-130%;width:70%;height:100%;
  background:var(--sheen);transform:skewX(-18deg);
  transition:left .75s var(--ease);pointer-events:none;z-index:3;
}
.stat:hover::after,.team-card:hover::after,.myitem:hover::after,
.notif:hover::after,.glossy:hover::after{left:140%}

/* الرفع عند المرور */
.stat,.team-card,.myitem,.notif{transition:transform .28s var(--ease),box-shadow .28s var(--ease)}
.stat:hover,.team-card:hover,.myitem:hover,.notif:hover{
  transform:translateY(-3px);box-shadow:var(--glass-shadow-hover);
}
.tmap{transition:box-shadow .28s var(--ease)}
.tmap:hover{box-shadow:var(--glass-shadow-hover)}
.glossy{position:relative;overflow:hidden}

/* ===== الحقول — زجاج مقعّر ===== */
.np-field input,.np-field select,.np-field textarea,
.fld input,.fld select,.fld textarea,
.searchbar,.set-add input,.set-add select,.sb-row select,
.padd input,.chat-input input,.share-link-box input{
  background:linear-gradient(165deg,rgba(255,255,255,.95),rgba(244,248,254,.8));
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1.5px solid var(--line);
  box-shadow:inset 0 2px 4px rgba(16,32,70,.045),inset 0 1px 0 rgba(255,255,255,.95);
  transition:border-color .22s var(--ease),box-shadow .22s var(--ease),background .22s var(--ease);
}
.np-field input:focus,.np-field textarea:focus,.np-field select:focus,
.fld input:focus,.fld textarea:focus,.fld select:focus,
.padd input:focus,.chat-input input:focus,.set-add input:focus,.set-add select:focus{
  outline:none;border-color:var(--blue-400);background:#fff;
  box-shadow:0 0 0 4px rgba(59,111,240,.13),inset 0 1px 0 rgba(255,255,255,1);
}
.searchbar:focus-within{
  border-color:var(--blue-300);background:#fff;
  box-shadow:0 0 0 4px rgba(59,111,240,.10);
}

/* اللوحات الزجاجية الثانوية */
.node-panel{
  background:linear-gradient(152deg,rgba(255,255,255,.95),rgba(244,248,254,.88));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-line);
  box-shadow:0 8px 30px rgba(16,32,70,.08),inset 0 1px 0 rgba(255,255,255,1);
}
.modal{
  background:linear-gradient(160deg,rgba(255,255,255,.99),rgba(248,251,255,.96));
  backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);
  border:1px solid var(--glass-line);
  box-shadow:var(--shadow-lg),inset 0 1px 0 rgba(255,255,255,1);
}

/* ===== أيقونات SVG عامة ===== */
.ico{flex-shrink:0;vertical-align:middle}
.chip .ico{width:13px;height:13px}
.myitem-top .chip .ico{width:14px;height:14px}
.sb-btn .ico{width:20px;height:20px}
.stat-ico .ico,.act-ico .ico,.notif-ico .ico{width:20px;height:20px}

/* ===== المهام الخاصة (مساحة معزولة) ===== */
.pcard{border-radius:var(--r-lg);padding:22px;margin-bottom:18px;border-right:5px solid var(--violet)}
.pcard-head{margin-bottom:16px}
.pcard-title{display:flex;align-items:flex-start;gap:12px}
.pcard-title .ico{color:var(--violet);margin-top:2px}
.pcard-title b{font-size:17px;font-weight:800;display:block;margin-bottom:4px}
.pcard-title span{font-size:12.5px;color:var(--ink-400);line-height:1.6}
.padd{display:flex;gap:10px;flex-wrap:wrap}
.padd input{flex:1;min-width:160px;height:46px;border:1.5px solid var(--line);border-radius:13px;padding:0 16px;font-size:14px;background:linear-gradient(160deg,rgba(255,255,255,.9),rgba(247,249,253,.75));transition:all .2s}
.padd input:focus{outline:none;border-color:var(--violet);background:#fff}
.padd .pill-blue{background:linear-gradient(135deg,#8B5CF6,#6D28D9);box-shadow:0 10px 26px rgba(124,58,237,.28)}

.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pcol{background:linear-gradient(150deg,rgba(255,255,255,.95),rgba(247,249,253,.86));border:1px solid rgba(255,255,255,.65);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:18px}
.pcol-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:var(--ink-700);margin-bottom:14px}
.pcol-head .ico{color:var(--blue-500)}
.pcol-head.done .ico{color:var(--green-ok)}
.pcol-head em{margin-right:auto;background:var(--surface-2);color:var(--ink-500);font-style:normal;font-size:12px;font-weight:800;min-width:24px;height:24px;padding:0 8px;border-radius:12px;display:grid;place-items:center}
.ptask{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:9px;transition:all .2s}
.ptask:hover{box-shadow:var(--shadow-sm);transform:translateX(-2px)}
.ptask.done{opacity:.65;background:var(--surface-2)}
.ptask.done .ptask-body b{text-decoration:line-through;color:var(--ink-400)}
.ptask-check{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);background:#fff;display:grid;place-items:center;color:#fff;flex-shrink:0;transition:all .2s}
.ptask-check:hover{border-color:var(--violet)}
.ptask-check.on{background:var(--green-ok);border-color:var(--green-ok)}
.ptask-body{flex:1}
.ptask-body b{font-size:14px;font-weight:700;display:block}
.ptask-body span{font-size:12px;color:var(--ink-400);display:block;margin-top:2px}
.ptask-del{width:28px;height:28px;border-radius:8px;background:var(--surface-2);color:var(--ink-400);display:grid;place-items:center;flex-shrink:0;transition:all .2s}
.ptask-del:hover{background:#FF547018;color:var(--red)}
.pempty{text-align:center;color:var(--ink-300);font-size:13px;padding:24px}
@media(max-width:760px){.pgrid{grid-template-columns:1fr}}

/* ===== التقويم التفاعلي ===== */
.cal-wrap{display:grid;grid-template-columns:1fr;gap:16px}
.cal-wrap.has-panel{grid-template-columns:1fr 340px}
.cal-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.cal-month-nav{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:6px;box-shadow:var(--shadow-sm)}
.cal-month-label{text-align:center;min-width:130px}
.cal-month-label b{font-size:17px;font-weight:800;display:block;line-height:1.2}
.cal-navbtn{width:40px;height:40px;border-radius:12px;background:var(--surface-2);border:none;display:grid;place-items:center;color:var(--ink-600);transition:all .2s;cursor:pointer}
.cal-navbtn:hover{background:var(--blue-grad);color:#fff;transform:scale(1.05)}
.cal-navbtn:active{transform:scale(.95)}
.cal-todaybtn{height:36px;padding:0 16px;border-radius:11px;background:var(--blue-50);color:var(--blue-600);font-size:12.5px;font-weight:700;transition:all .2s;margin-right:4px}
.cal-todaybtn:hover{background:var(--blue-grad);color:#fff}
.cal-mcount{font-size:11px;color:var(--ink-400);font-weight:600}
.cal-cell.has-pub{background:linear-gradient(160deg,var(--green-soft),rgba(231,248,241,.4));border-color:rgba(22,185,129,.25)}
.cal-cell.has-pub .cal-dnum{color:var(--green-ok)}
.cal-ev.pub{font-weight:700}
.cal-mcount{font-size:12.5px;color:var(--ink-400);font-weight:600;margin-right:10px}
.cal-grid-card{border-radius:var(--r-lg);padding:18px}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:10px}
.cal-week span{text-align:center;font-size:12px;font-weight:700;color:var(--ink-400)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-cell{position:relative;min-height:92px;border-radius:14px;background:var(--surface-2);border:1.5px solid transparent;padding:8px;cursor:pointer;transition:all .2s;overflow:hidden}
.cal-cell.empty{background:transparent;cursor:default}
.cal-cell:not(.empty):hover{border-color:var(--blue-300);background:#fff;transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.cal-cell.today{background:var(--blue-50);border-color:var(--blue-300)}
.cal-cell.sel{border-color:var(--blue-500);background:#fff;box-shadow:0 8px 22px rgba(37,99,235,.18)}
.cal-cell.has-ev{cursor:pointer}
.cal-dnum{font-size:13px;font-weight:800;color:var(--ink-700)}
.cal-cell.today .cal-dnum{color:var(--blue-600)}
.cal-dots{position:absolute;top:11px;left:8px;display:flex;gap:3px}
.cal-dots i{width:6px;height:6px;border-radius:50%}
.cal-evs{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.cal-ev{font-size:10px;font-weight:600;padding:3px 6px;border-radius:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-more{font-size:9.5px;color:var(--ink-400);font-weight:700;padding-right:3px}
.cal-hint{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-400);margin-top:14px}
.cal-hint .ico{color:var(--blue-500)}

/* لوحة اليوم */
.cal-day-panel{border-radius:var(--r-lg);padding:18px;align-self:start;position:sticky;top:0}
.cdp-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.cdp-head b{font-size:15px;font-weight:800;display:block}
.cdp-head span{font-size:12px;color:var(--ink-400)}
.cdp-list{display:flex;flex-direction:column;gap:12px}
.cdp-item{background:#fff;border:1px solid var(--line);border-right:4px solid var(--c);border-radius:14px;padding:14px}
.cdp-item-head{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.cdp-title{font-size:14px;font-weight:800;display:block;margin-bottom:6px;line-height:1.4}
.cdp-person{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-500);margin-bottom:12px}
.cdp-person .ico{color:var(--ink-400)}
.cdp-actions{display:flex;flex-direction:column;gap:7px}
.cdp-link{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--blue-600);background:var(--blue-50);padding:9px 12px;border-radius:10px;transition:all .2s}
.cdp-link:hover{background:var(--blue-grad);color:#fff}
.cdp-nolink{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--ink-300);background:var(--surface-2);padding:9px 12px;border-radius:10px}
.cdp-actions .btn-sm{justify-content:center}
.cdp-empty{text-align:center;padding:30px 10px;color:var(--ink-300)}
.cdp-empty .ico{color:var(--ink-300);margin-bottom:8px}
.cdp-empty p{font-size:13px}
.cdp-add{margin-top:6px;width:100%;height:42px;border:1.5px dashed var(--blue-300);border-radius:12px;color:var(--blue-600);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.cdp-add:hover{background:var(--blue-50)}
@media(max-width:900px){.cal-wrap.has-panel{grid-template-columns:1fr}.cal-cell{min-height:70px}.cal-evs{display:none}}
.recheck-banner{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#FEF4E2,#FEE9EC);border:1px solid #F6A60940;border-radius:12px;padding:11px 14px;font-size:12.5px;font-weight:700;color:#B45309;margin-bottom:14px}
.recheck-banner .ico{color:var(--amber);flex-shrink:0}
/* صندوق الملفات الجاهزة للنشر */
.deliver-box{background:linear-gradient(150deg,#EFF4FE,#F0FBF6);border:1px solid var(--blue-100);border-radius:14px;padding:14px;margin-bottom:14px}
.deliver-head{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:var(--ink-700);margin-bottom:10px}
.deliver-head .ico{color:var(--blue-600)}
.deliver-link{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 13px;margin-bottom:7px;transition:all .2s}
.deliver-link:last-child{margin-bottom:0}
.deliver-link:hover{border-color:var(--blue-400);box-shadow:var(--shadow-sm);transform:translateX(-2px)}
.deliver-info{display:flex;flex-direction:column;gap:1px}
.deliver-info b{font-size:13px;font-weight:700;color:var(--ink-900)}
.deliver-info small{font-size:11px;color:var(--ink-400)}
.deliver-go{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--blue-600);background:var(--blue-50);padding:6px 11px;border-radius:9px}
.deliver-empty{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px dashed var(--line);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--ink-400);margin-bottom:14px}
.deliver-empty .ico{color:var(--ink-300)}
/* أزرار النشر بالتقويم */
.cdp-pubrow{display:flex;gap:6px}
.cdp-pubrow .btn-sm{flex:1;justify-content:center}
.cdp-published{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:700;color:var(--green-ok);background:var(--green-soft);padding:9px;border-radius:10px}
/* قفل النشر قبل الموافقة */
.pub-locked{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#FEF4E2,#FFF8EC);border:1px solid #F6A60930;border-radius:14px;padding:16px}
.pub-locked .ico{color:var(--amber);flex-shrink:0}
.pub-locked b{font-size:14px;font-weight:800;display:block;color:#B45309}
.pub-locked span{font-size:12px;color:var(--ink-500)}
/* الكابشن الجاهز */
.ready-cap{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:7px}
.ready-cap-head{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;color:var(--ink-600);margin-bottom:8px}
.ready-cap-text{position:relative;font-size:12.5px;color:var(--ink-700);line-height:1.7;background:var(--surface-2);border-radius:9px;padding:10px 12px;white-space:pre-wrap}
.ready-copy{position:absolute;top:8px;left:8px;display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--blue-600);background:#fff;border:1px solid var(--line);border-radius:7px;padding:4px 8px}
.ready-copy:hover{background:var(--blue-50)}
/* وقت النشر بالتقويم */
.cdp-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.cdp-time{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--blue-600)}
.cdp-time .ico{color:var(--blue-500)}
.cal-ev b{font-weight:800}
/* سجل التعديل ووضع التعديل */
.audit-row{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-400);background:var(--surface-2);border-radius:9px;padding:8px 11px;margin-bottom:12px}
.audit-row .ico{color:var(--ink-400)}
.audit-row b{color:var(--ink-600)}
.edit-notice{display:flex;align-items:center;gap:7px;background:#FEF4E2;border:1px solid #F6A60930;border-radius:10px;padding:9px 12px;font-size:12px;font-weight:600;color:#B45309;margin-bottom:10px}
.edit-notice .ico{color:var(--amber)}
/* رأس اللوحة + مشاركة */
.np-head-actions{display:flex;gap:6px}
.np-share{width:30px;height:30px;border-radius:9px;background:#fff;display:grid;place-items:center;color:var(--blue-600);transition:all .2s}
.np-share:hover{background:var(--blue-grad);color:#fff}
.tmap-tool.share:hover{background:var(--blue-grad);color:#fff}
/* مودال المشاركة */
.share-card{border-right:4px solid var(--c);background:var(--surface-2);border-radius:14px;padding:16px;margin-bottom:16px}
.share-chips{display:flex;gap:7px;margin-bottom:10px}
.share-title{font-size:16px;font-weight:800;display:block;margin-bottom:6px}
.share-desc{font-size:12.5px;color:var(--ink-500);line-height:1.6}
.share-link-box{display:flex;gap:8px;margin-bottom:14px}
.share-link-box input{flex:1;height:42px;border:1.5px solid var(--line);border-radius:11px;padding:0 13px;font-size:12.5px;color:var(--ink-600);background:var(--surface-2);font-family:'IBM Plex Mono',monospace;direction:ltr;text-align:left}
.share-actions{display:flex;flex-direction:column;gap:9px}
.share-btn{display:flex;align-items:center;gap:9px;height:46px;border-radius:12px;padding:0 16px;font-size:13.5px;font-weight:700;transition:all .2s;border:1.5px solid var(--line);background:#fff;color:var(--ink-700)}
.share-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.share-btn.teams{background:linear-gradient(135deg,#5059C9,#7B83EB);color:#fff;border:none}
.share-btn.jump:hover{border-color:var(--blue-400);color:var(--blue-600)}
.share-btn.copy:hover{border-color:var(--green-ok);color:var(--green-ok)}

/* ===== واجهة المحادثة (تيمز) ===== */
.chat-teams-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;background:linear-gradient(135deg,#EEF0FB,#F3F0FC);border:1px solid #5059C922;border-radius:14px;padding:12px 16px;margin-bottom:16px}
.ctb-left{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink-700)}
.ctb-left .ico{color:#5059C9}
.ctb-badge{background:var(--green-soft);color:var(--green-ok);font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px}
.ctb-note{font-size:11.5px;color:var(--ink-400)}
.chat-wrap{display:grid;grid-template-columns:260px 1fr;gap:16px;height:calc(100vh - 230px);min-height:440px}
.chat-side{border-radius:var(--r-lg);padding:14px;overflow-y:auto}
.chat-side-head{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:var(--ink-600);margin-bottom:12px}
.chat-side-head .ico{color:var(--blue-600)}
.chat-ch{display:flex;align-items:center;gap:10px;width:100%;padding:10px 11px;border-radius:11px;text-align:right;transition:all .18s;margin-bottom:4px}
.chat-ch:hover{background:var(--surface-2)}
.chat-ch.on{background:var(--blue-50)}
.chat-ch-ico{width:34px;height:34px;border-radius:10px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-500);flex-shrink:0}
.chat-ch.on .chat-ch-ico{background:var(--blue-grad);color:#fff}
.chat-ch-info{flex:1;min-width:0}
.chat-ch-info b{font-size:13px;font-weight:700;display:block}
.chat-ch-info small{font-size:11px;color:var(--ink-400);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-main{border-radius:var(--r-lg);display:flex;flex-direction:column;overflow:hidden}
.chat-head{padding:16px 20px;border-bottom:1px solid var(--line)}
.chat-head-title{font-size:16px;font-weight:800;display:block}
.chat-head-sub{font-size:12px;color:var(--ink-400)}
.chat-msgs{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.chat-msg{display:flex;gap:10px;max-width:75%}
.chat-msg.mine{align-self:flex-start;flex-direction:row-reverse}
.chat-av{width:34px;height:34px;border-radius:10px;color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0;font-size:13px}
.chat-bubble{background:var(--surface-2);border-radius:14px;padding:10px 14px}
.chat-msg.mine .chat-bubble{background:var(--blue-grad);color:#fff}
.chat-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.chat-meta b{font-size:12px;font-weight:800;color:var(--ink-700)}
.chat-meta span{font-size:10.5px;color:var(--ink-400)}
.chat-msg.mine .chat-meta span{color:rgba(255,255,255,.75)}
.chat-bubble p{font-size:13.5px;line-height:1.6}
.chat-input{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line)}
.chat-input input{flex:1;height:46px;border:1.5px solid var(--line);border-radius:13px;padding:0 16px;font-size:14px;background:var(--surface-2);transition:all .2s}
.chat-input input:focus{outline:none;border-color:var(--blue-400);background:#fff}
.chat-send{width:46px;height:46px;border-radius:13px;background:var(--blue-grad);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow-blue);transition:transform .2s}
.chat-send:hover{transform:scale(1.05)}
@media(max-width:820px){.chat-wrap{grid-template-columns:1fr}.chat-side{display:none}}


@keyframes pulse {
  0% { transform: scale(0.95); opacity: 0.6; }
  50% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(0.95); opacity: 0.6; }
}

/* ================================================================
   شاشة تسجيل الدخول — زجاج فاتح
   ================================================================ */
.login-screen{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;
  padding:20px;overflow:hidden;background:radial-gradient(120% 120% at 80% 0%,#FFFFFF 0%,#F2F6FD 45%,#E9F0FB 100%)}
.login-blob{position:absolute;border-radius:50%;pointer-events:none}
.login-blob.b1{width:340px;height:340px;background:rgba(59,111,240,.16);filter:blur(90px);top:-70px;right:-60px;animation:loginFloat1 11s ease-in-out infinite alternate}
.login-blob.b2{width:420px;height:420px;background:rgba(124,92,252,.13);filter:blur(110px);bottom:-120px;left:-110px;animation:loginFloat2 13s ease-in-out infinite alternate}
.login-blob.b3{width:260px;height:260px;background:rgba(14,165,233,.10);filter:blur(80px);top:45%;left:52%;animation:loginFloat1 16s ease-in-out infinite alternate-reverse}
@keyframes loginFloat1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(44px,34px) scale(1.14)}}
@keyframes loginFloat2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-38px,-46px) scale(1.18)}}

.login-card{position:relative;z-index:10;width:100%;max-width:430px;padding:38px 36px 34px;
  display:flex;flex-direction:column;gap:24px;text-align:center;border-radius:26px;
  background:linear-gradient(158deg,rgba(255,255,255,.96),rgba(248,251,255,.86));
  backdrop-filter:blur(26px) saturate(1.5);-webkit-backdrop-filter:blur(26px) saturate(1.5);
  border:1px solid rgba(255,255,255,.92);
  box-shadow:0 28px 70px rgba(16,32,70,.14),0 8px 20px rgba(16,32,70,.05),
             inset 0 1px 0 rgba(255,255,255,1),inset 0 -1px 0 rgba(220,231,253,.6);
  animation:fadeUp .5s var(--ease) both}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:9px}
.login-mark{width:56px;height:56px;border-radius:17px;background:var(--blue-grad);color:#fff;
  display:grid;place-items:center;margin-bottom:4px;
  box-shadow:var(--shadow-blue),inset 0 1px 0 rgba(255,255,255,.35)}
.login-wordmark{display:flex;align-items:baseline;gap:8px;line-height:1}
.login-wordmark b{font-size:29px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(115deg,#2563EB,#7C5CFC 70%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.login-wordmark span{font-size:12px;font-weight:700;letter-spacing:3.5px;color:var(--ink-400)}
.login-tag{color:var(--ink-500);font-size:14px;margin:0}

.login-error{display:none;color:var(--red);font-size:13px;font-weight:600;
  background:linear-gradient(165deg,#FEF1F4,var(--red-soft));padding:11px 14px;border-radius:12px;
  border:1px solid rgba(244,63,94,.22);box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.login-error.show{display:block;animation:shakeX .4s}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.login-fields{display:flex;flex-direction:column;gap:15px;text-align:right}
.login-fld{display:flex;flex-direction:column;gap:7px}
.login-fld label{font-weight:700;color:var(--ink-700);font-size:13px}
.login-fld input{height:50px;padding:0 15px;font-size:15px;border-radius:13px;color:var(--ink-900);
  background:linear-gradient(165deg,rgba(255,255,255,.96),rgba(244,248,254,.82));
  border:1.5px solid var(--line-2);
  box-shadow:inset 0 2px 5px rgba(16,32,70,.05),inset 0 1px 0 rgba(255,255,255,.95);
  transition:all .22s var(--ease)}
.login-fld input:focus{outline:none;border-color:var(--blue-400);background:#fff;
  box-shadow:0 0 0 4px rgba(59,111,240,.14),inset 0 1px 0 #fff}
#loginPass{direction:ltr;text-align:right;padding-left:48px}
.login-pass-wrap{position:relative;display:flex;align-items:center}
.login-pass-wrap input{width:100%}
.pw-toggle{position:absolute;left:9px;width:34px;height:34px;border-radius:10px;
  display:grid;place-items:center;color:var(--ink-400);background:transparent;transition:all .2s}
.pw-toggle:hover{background:var(--blue-50);color:var(--blue-600)}
.pw-toggle svg{width:19px;height:19px}

.login-actions{display:flex;flex-direction:column;gap:12px;margin-top:2px}
.login-submit{height:50px;font-size:15px;border-radius:13px}
.login-or{display:flex;align-items:center;gap:12px;color:var(--ink-300);font-size:12px;font-weight:600}
.login-or::before,.login-or::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line-2),transparent)}
.login-quick{position:relative;height:50px;border-radius:13px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:9px;
  font-size:14px;font-weight:700;color:var(--ink-700);
  background:linear-gradient(165deg,rgba(255,255,255,.98),rgba(245,249,254,.9));
  border:1.5px solid var(--line-2);
  box-shadow:var(--shadow-sm),inset 0 1px 0 rgba(255,255,255,1);
  transition:all .24s var(--ease)}
.login-quick::after{content:"";position:absolute;top:0;left:-130%;width:60%;height:100%;
  background:var(--sheen);transform:skewX(-18deg);transition:left .7s var(--ease);pointer-events:none}
.login-quick:hover{border-color:var(--blue-300);color:var(--blue-600);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.login-quick:hover::after{left:150%}
.login-quick .qa-ico{display:grid;place-items:center;color:var(--blue-500)}
.login-quick .qa-ico svg{width:18px;height:18px}

/* ================================================================
   لوحة العرض (الوصول السريع) — دارك مود، شاشة عرض دائمة
   ================================================================ */
.ops{display:none;position:fixed;inset:0;z-index:999999;overflow-y:auto;padding:30px 34px 40px;
  color:#E6EDF9;font-family:'Cairo',system-ui,sans-serif;direction:rtl;
  background:radial-gradient(130% 100% at 15% -10%,#141C33 0%,#0C1220 45%,#070B14 100%)}
.ops-grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);
  background-size:54px 54px;
  -webkit-mask-image:radial-gradient(circle at 50% 0%,#000 10%,transparent 78%);
  mask-image:radial-gradient(circle at 50% 0%,#000 10%,transparent 78%)}
.ops-aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ops-aurora i{position:absolute;border-radius:50%;filter:blur(110px);opacity:.4}
.ops-aurora i:nth-child(1){width:520px;height:520px;background:#2563EB;top:-190px;right:-120px;animation:opsDrift 22s ease-in-out infinite alternate}
.ops-aurora i:nth-child(2){width:460px;height:460px;background:#7C3AED;bottom:-200px;left:-100px;animation:opsDrift 26s ease-in-out infinite alternate-reverse}
.ops-aurora i:nth-child(3){width:360px;height:360px;background:#0EA5E9;top:38%;left:44%;opacity:.22;animation:opsDrift 30s ease-in-out infinite alternate}
@keyframes opsDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(70px,50px) scale(1.22)}}
.ops>*:not(.ops-aurora):not(.ops-grid-bg){position:relative;z-index:1}

.ops-head{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;
  margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.09)}
.ops-title-wrap{display:flex;align-items:center;gap:16px}
.ops-livedot{position:relative;width:12px;height:12px;flex-shrink:0}
.ops-livedot span{position:absolute;inset:0;border-radius:50%;background:#22E5A0;box-shadow:0 0 14px #22E5A0}
.ops-livedot::after{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid #22E5A0;animation:opsPing 2s cubic-bezier(0,0,.2,1) infinite}
@keyframes opsPing{0%{transform:scale(1);opacity:.9}100%{transform:scale(3.4);opacity:0}}
.ops-title{margin:0;font-size:31px;font-weight:800;letter-spacing:-.6px;
  background:linear-gradient(115deg,#7DB0FF,#A78BFA 55%,#F472B6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.ops-sub{margin:7px 0 0;color:#8FA1BE;font-size:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ops-live{background:rgba(34,229,160,.13);color:#22E5A0;border:1px solid rgba(34,229,160,.3);
  font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;letter-spacing:.5px}
.ops-clock{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#6E819F;letter-spacing:.5px}
.ops-head-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ops-legend{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.ops-exit{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 20px;border-radius:12px;
  background:rgba(255,255,255,.055);color:#DCE6F7;border:1px solid rgba(255,255,255,.13);
  font-size:13.5px;font-weight:700;backdrop-filter:blur(12px);transition:all .28s var(--ease)}
.ops-exit:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.24);transform:translateY(-2px)}
.qa-exit-ico{display:grid;place-items:center}
.qa-exit-ico svg{width:16px;height:16px}

/* ===== كروت المؤشرات (KPI) ===== */
.ops-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:14px;margin-bottom:20px}
.ops-kpi{position:relative;overflow:hidden;border-radius:18px;padding:17px 18px;
  background:linear-gradient(155deg,rgba(255,255,255,.075),rgba(255,255,255,.022));
  border:1px solid rgba(255,255,255,.10);backdrop-filter:blur(16px);
  box-shadow:0 8px 28px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.12);
  animation:fadeUp .5s var(--ease) both}
.ops-kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:44%;
  background:linear-gradient(180deg,rgba(255,255,255,.09),transparent);pointer-events:none}
.ops-kpi::after{content:"";position:absolute;top:0;right:0;width:3px;height:100%;background:var(--k);
  box-shadow:0 0 16px var(--k);opacity:.85}
.ops-kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.ops-kpi-ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  background:color-mix(in srgb,var(--k) 16%,transparent);color:var(--k);
  border:1px solid color-mix(in srgb,var(--k) 30%,transparent)}
.ops-kpi-ico svg{width:17px;height:17px}
.ops-kpi b{font-size:29px;font-weight:800;display:block;line-height:1;color:#F2F6FD;
  font-family:'IBM Plex Mono',monospace;letter-spacing:-1px}
.ops-kpi span{font-size:12px;color:#8093B2;font-weight:600;display:block;margin-top:5px}

/* ===== شارات البراند ===== */
.dash-brand-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.2px;white-space:nowrap;line-height:1.4}
.dash-brand-badge svg{width:12px;height:12px}
.dash-brand-badge.academy{background:rgba(37,99,235,.15);color:#7DB0FF;border:1px solid rgba(37,99,235,.32)}
.dash-brand-badge.zone{background:rgba(124,58,237,.15);color:#B49BFB;border:1px solid rgba(124,58,237,.32)}
.dash-brand-badge.tick{background:rgba(249,115,22,.15);color:#FDA968;border:1px solid rgba(249,115,22,.32)}

/* ===== الجداول ===== */
.ops-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(520px,1fr));gap:18px;width:100%}
.ops-panel{position:relative;overflow:hidden;border-radius:18px;
  background:linear-gradient(160deg,rgba(255,255,255,.055),rgba(255,255,255,.015));
  border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(16px);
  box-shadow:0 10px 34px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.09)}
.ops-table{width:100%;border-collapse:collapse;text-align:right;direction:rtl}
.ops-table thead tr{background:rgba(255,255,255,.035)}
.ops-table th{padding:14px 16px;color:#8093B2;font-weight:700;font-size:12px;
  letter-spacing:.6px;border-bottom:1px solid rgba(255,255,255,.09);white-space:nowrap}
.ops-table th.c{text-align:center;width:74px}
.ops-table td{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.045);vertical-align:middle}
.ops-table tbody tr{transition:background .25s var(--ease)}
.ops-table tbody tr:hover{background:rgba(255,255,255,.035)}
.ops-table tbody tr:last-child td{border-bottom:none}
.ops-task{display:flex;align-items:center;gap:11px}
.ops-accent{width:4px;height:38px;border-radius:3px;flex-shrink:0;background:var(--b);box-shadow:0 0 10px var(--b);opacity:.9}
.ops-task-info{overflow:hidden;min-width:0}
.ops-task-title{font-weight:700;font-size:14.5px;color:#F1F5FC;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:5px}
.ops-task-meta{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.ops-due{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#6E819F;font-family:'IBM Plex Mono',monospace}
.ops-due svg{width:12px;height:12px}
.ops-cell{text-align:center}
.ops-empty-cell{color:#33415C;font-size:15px}

/* مربعات الحالة */
.ops-box{width:32px;height:32px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;transition:transform .25s var(--ease);position:relative}
.ops-box:hover{transform:scale(1.14)}
.ops-box svg{width:15px;height:15px}
.ops-box.done{background:rgba(22,185,129,.13);border:1.5px solid rgba(22,185,129,.45);color:#34E3A8;box-shadow:0 0 12px rgba(22,185,129,.2)}
.ops-box.working{background:rgba(59,111,240,.13);border:1.5px solid rgba(59,111,240,.5);color:#7DB0FF;animation:dashPulse 2s ease-in-out infinite}
.ops-box.approval{background:rgba(245,158,11,.13);border:1.5px solid rgba(245,158,11,.45);color:#FBBF24}
.ops-box.rejected{background:rgba(244,63,94,.13);border:1.5px solid rgba(244,63,94,.45);color:#FB7185;box-shadow:0 0 12px rgba(244,63,94,.16)}
.ops-box.pending{background:rgba(255,255,255,.032);border:1.5px solid rgba(255,255,255,.09);color:#3E4D69}
.ops-pulse-dot{width:8px;height:8px;border-radius:50%;background:#7DB0FF;animation:opsBlink 1.5s ease-in-out infinite}
@keyframes opsBlink{0%,100%{transform:scale(.85);opacity:.55}50%{transform:scale(1.25);opacity:1}}
@keyframes dashPulse{0%,100%{box-shadow:0 0 5px rgba(59,111,240,.3)}50%{box-shadow:0 0 18px rgba(59,111,240,.65)}}
.ops-hourglass{animation:opsFlip 2.6s ease-in-out infinite}
@keyframes opsFlip{0%,42%{transform:rotate(0)}50%,92%{transform:rotate(180deg)}100%{transform:rotate(360deg)}}
.ops-none{padding:44px;text-align:center;color:#3E4D69;font-size:14px}
#publicDashboard::-webkit-scrollbar{width:7px}
#publicDashboard::-webkit-scrollbar-track{background:transparent}

#publicDashboard::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}
@media(max-width:1100px){.ops-body{grid-template-columns:1fr}.ops{padding:20px}.ops-title{font-size:24px}}

<script>
/* حقن الأيقونات المخصصة في شاشة الدخول (تُستدعى بعد تحميل مكتبة SVG) */
function paintLoginIcons(){
  if(typeof icon!=='function') return;
  const t=document.getElementById('pwToggle');
  if(t) t.innerHTML=icon('eye',19);
  document.querySelectorAll('.qa-ico').forEach(e=>e.innerHTML=icon('monitor',18));
  document.querySelectorAll('.qa-exit-ico').forEach(e=>e.innerHTML=icon('key',16));
}
function togglePassword(){
  const p=document.getElementById('loginPass');
  const t=document.getElementById('pwToggle');
  const show = p.type==='password';
  p.type = show?'text':'password';
  if(t && typeof icon==='function'){
    t.innerHTML=icon(show?'eyeOff':'eye',19);
    t.setAttribute('aria-label', show?'إخفاء كلمة المرور':'إظهار كلمة المرور');
  }
  p.focus();
}
async function performLogin(){
  const errEl=document.getElementById('loginError');
  errEl.classList.remove('show');
  const email=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass){ errEl.textContent='أدخل البريد وكلمة المرور'; errEl.classList.add('show'); return; }

  const btn=document.querySelector('.login-submit');
  btn.disabled=true; btn.textContent='جاري الدخول…';
  try{
    await login(email, pass);              // supabase-client.js — مصادقة حقيقية
    await bootstrapFromSupabase();          // يجلب الفريق والمهام والأقسام
    document.getElementById('loginScreen').style.display='none';
    document.querySelector('.shell').style.display='flex';
    render();
  }catch(e){
    errEl.textContent = e.message || 'بيانات الدخول غير صحيحة';
    errEl.classList.add('show');
  }finally{
    btn.disabled=false; btn.textContent='تسجيل الدخول';
  }
}

/* يحوّل صفوف Supabase إلى شكل الحالة الذي تفهمه الواجهة */
async function bootstrapFromSupabase(){
  const [team, tasks, sections, notifs] = await Promise.all([
    fetchTeam(), fetchTasks(), fetchSections(), fetchNotifications()
  ]);
  store.team = team.map(p=>({ id:p.id, name:p.full_name, role:p.role,
                              av:p.avatar_color, phone:p.phone, telegram:p.telegram }));
  store.sections = sections.map(x=>x.kind);
  store.tasks = tasks.map(t=>({
    id:t.id, title:t.title, desc:t.description, brand:t.brand,
    priority:t.priority, due:t.due_date||'', isPartnership:t.is_partnership,
    coordinator:t.coordinator, coordNote:t.coord_note, coordLink:t.coord_link,
    stages:(t.stages||[]).map(g=>({
      id:g.id, kind:g.kind, person:g.assignee, state:g.state,
      text:g.text_content, note:g.note, link:g.link, reason:g.reason,
      publishDate:g.publish_date||'', publishTime:g.publish_time||'',
      lastEditBy:g.last_edit_by, lastEditAt:g.last_edit_at, needsRecheck:g.needs_recheck
    }))
  }));
  store.notifications = notifs.map(n=>({
    id:n.id, type:n.type, title:n.title, body:n.body,
    read:n.is_read, time:new Date(n.created_at).toLocaleString('ar-IQ')
  }));
  store.currentUser = myId();
  store.roles = ROLE_ORDER.map(r=>ROLE_AR[r]);
}

async function logout(){ try{ await window.logout ? null : null; }catch(e){}
  try{ await sb.auth.signOut(); }catch(e){}
  location.reload(); }
</script>

function getApprStyle(val) {
  if (val === 'Approved') return 'background:var(--green-soft);color:var(--green-ok);';
  if (val === 'Rejected') return 'background:var(--red-soft);color:var(--red);';
  if (val === 'Hold') return 'background:var(--amber-soft);color:var(--amber);';
  if (val === 'FALSE') return 'background:var(--surface-2);color:var(--ink-700);';
  return 'background:var(--line);color:var(--ink-900);';
}

const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// تأمين الروابط: يمنع javascript:/data:/vbscript: ويسمح فقط http/https
function safeUrl(u){u=String(u||'').trim();if(!u)return '#';const low=u.toLowerCase();
  if(low.startsWith('javascript:')||low.startsWith('data:')||low.startsWith('vbscript:')||low.startsWith('file:'))return '#';
  if(/^https?:\/\//i.test(u))return esc(u);
  if(/^[\w.-]+\.[a-z]{2,}/i.test(u))return esc('https://'+u);
  return '#';}

function openTeamsPopup(e) {
  if (e) e.preventDefault();
  const width = 650;
  const height = Math.min(800, screen.height - 100);
  const left = (screen.width - width) / 2;
  const top = (screen.height - height) / 2;
  window.open('https://teams.microsoft.com/', 'MSTeamsPopup', `width=${width},height=${height},top=${top},left=${left},resizable=yes,scrollbars=yes,status=no,toolbar=no,menubar=no,location=no`);
}

function getVisibleTasks() {
  const u = userById(store.currentUser);
  if (u && u.role === 'شريك خارجي') {
    return store.tasks.filter(t => t.isPartnership && t.stages.some(s => s.person === u.id));
  }
  return store.tasks;
}

function nodeCard(task,st,idx){
  const k=SK(st.kind),person=st.person?userById(st.person):null,ns=NSTATE[st.state]||{ar:'غير معروف',color:'#999',svg:'dot'};
  const opened=openNode[task.id]===st.id;
  const prevDone=idx>0?['done','approved'].includes(task.stages[idx-1].state):true;
  // تحديد حالة الدائرة بصرياً
  const isDone=['done','approved'].includes(st.state);
  const isRejected=st.state==='rejected';
  // الجاري = أول مرحلة غير منجزة (working أو approval أو أول pending بعد منجز)
  const firstActiveIdx=task.stages.findIndex(s=>!['done','approved'].includes(s.state)&&s.state!=='rejected');
  const isActiveStage=(st.state==='working'||st.state==='approval')||(idx===firstActiveIdx&&!isRejected);
  let cls='pending';
  if(isRejected)cls='rejected';
  else if(isDone)cls='done';
  else if(isActiveStage)cls='active-stage';
  return `<div class="cnode ${cls} ${opened?'opened':''}" style="--c:${k.color}">
    <div class="cnode-line before ${prevDone?'done':''}"></div>
    <div class="cnode-line after ${isDone?'done':''}"></div>
    <div class="cnode-circle" onclick="toggleNode('${task.id}','${st.id}')" title="${k.ar}">
      <span class="cn-ico">${icon(k.svg,27)}</span>
      <span class="cn-state" style="background:${ns.color}">${icon(ns.svg,12)}</span>
    </div>
    <div class="cnode-label">
      <div class="cnode-name">${k.ar}</div>
      ${person?`<div class="cnode-person"><i class="cn-av" style="background:${person.av}">${person.name[0]}</i> ${esc(person.name)}</div>`:`<div class="cnode-noperson">لم يُعيَّن</div>`}
    </div>
  </div>`;
}
function nodePanel(task,st){
  const k=SK(st.kind),u=store.currentUser;
  const isOwner=st.person===u, isCoord=task.coordinator===u||isBuilder(u), isAdmin=isApprover(u);
  const canEdit=isOwner||isCoord;
  let inner='';
  // تنبيه إعادة التدقيق على مرحلتي المراجعة والموافقة
  const needsRecheck=task.stages.some(s=>s._needsRecheck);
  if(needsRecheck&&(k.ar.includes('مراجعة')||k.isApproval)){
    inner+=`<div class="recheck-banner">${icon('clock',15)} حدث تعديل على محتوى سابق — يجب إعادة التدقيق ثم طلب الموافقة من جديد.</div>`;
  }
  if(k.isApproval){
    if(st.state==='approved')inner=`<div class="np-content" style="color:var(--green-ok)">${icon('checkCircle',15)} تمت الموافقة — انتقلت المهمة لمرحلة النشر.</div>`;
    else if(st.state==='rejected'){
      inner=`<div class="np-reject"><label>سبب الرفض</label><div class="np-content" style="margin-top:8px;color:var(--red)">${esc(st.reason||'—')}</div></div>`;
      if(isAdmin)inner+=`<div class="np-actions" style="margin-top:10px"><button class="btn-sm btn-green" onclick="approveNode('${task.id}','${st.id}')">${icon('check',13)} تغيير إلى موافقة</button><button class="btn-sm btn-red" onclick="rejectNode('${task.id}','${st.id}')">${icon('cross',13)} تحديث سبب الرفض</button></div>`;
    }
    else{inner=`<div class="np-content">بانتظار موافقة الإدارة بعد اكتمال المراجعة.</div>`;
      if(isAdmin)inner+=`<div class="np-actions"><button class="btn-sm btn-green" onclick="approveNode('${task.id}','${st.id}')">${icon('check',13)} موافقة</button><button class="btn-sm btn-red" onclick="rejectNode('${task.id}','${st.id}')">${icon('cross',13)} رفض (مع السبب)</button></div>`;
      else inner+=`<p style="font-size:12px;color:var(--ink-400);margin-top:8px">الموافقة من صلاحية الإدارة فقط.</p>`;}
  }else if(k.isPublish){
    // هل تمت موافقة الإدارة؟
    const approvalStage=task.stages.find(s=>SK(s.kind).isApproval);
    const isApproved=approvalStage?approvalStage.state==='approved':true;
    // الكابشن النهائي (من مرحلة الكتابة)
    const captionStage=task.stages.find(s=>s.kind==='caption');
    const captionText=captionStage?captionStage.text:'';
    const captionLink=captionStage?captionStage.link:'';
    // ملف التصميم/المونتاج (رابط درايف)
    const fileStages=[];
    task.stages.forEach(s=>{const sk=SK(s.kind);
      if((s.kind==='design'||s.kind==='textdesign'||sk.ar.includes('مونتاج')||sk.ar.includes('فيديو'))&&s.link){
        fileStages.push({name:sk.ar,person:s.person?userById(s.person).name:'',link:s.link});}});

    if(!isApproved){
      inner=`<div class="pub-locked">${icon('approval',22)}<div><b>بانتظار موافقة الإدارة</b><span>يُفعّل تحديد موعد النشر بعد اعتماد المهمة من الإدارة.</span></div></div>`;
    }else{
      // صندوق المحتوى الجاهز للنشر
      let ready=`<div class="deliver-box"><div class="deliver-head">${icon('check',15)} المحتوى المعتمد جاهز للنشر</div>`;
      // الكابشن
      if(captionText||captionLink){
        ready+=`<div class="ready-cap"><div class="ready-cap-head">${icon('caption',14)} الكابشن النهائي ${captionStage.person?`· ${esc(userById(captionStage.person).name)}`:''}</div>
          ${captionText?`<div class="ready-cap-text">${esc(captionText)}<button class="ready-copy" data-copy="${esc(captionText)}" onclick="copyText(this)">${icon('doc',13)} نسخ</button></div>`:''}
          ${captionLink?`<a class="deliver-link" href="${safeUrl(captionLink)}" target="_blank" rel="noopener noreferrer"><span class="deliver-info"><b>رابط الكابشن</b></span><span class="deliver-go">${icon('publish',13)} فتح</span></a>`:''}
        </div>`;
      }
      // ملفات الدرايف
      if(fileStages.length){
        ready+=fileStages.map(d=>`<a class="deliver-link" href="${safeUrl(d.link)}" target="_blank" rel="noopener noreferrer">
