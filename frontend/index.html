function viewCalendar(){
  const events=calEvents();
  const AR_DAYS=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const AR_MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const fmt=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const y=calY,m=calM;
  const realToday=(y===2026&&m===5)?21:-1; // علّم 21 يونيو كـ"اليوم" فقط في شهره
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  let cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  const evOn=ds=>events.filter(e=>e.date===ds);
  const monthPrefix=`${y}-${String(m+1).padStart(2,'0')}`;
  const monthCount=events.filter(e=>e.date.startsWith(monthPrefix)).length;

  // اللوحة الجانبية ليوم مختار
  let sidePanel='';
  if(calSelDay){
    const ds=fmt(y,m,calSelDay);
    const dayEvs=evOn(ds);
    const dayName=AR_DAYS[new Date(y,m,calSelDay).getDay()];
    sidePanel=`<div class="cal-day-panel glass-card fade-up">
      <div class="cdp-head">
        <div><b>${dayName} ${calSelDay} ${AR_MONTHS[m]}</b><span>${dayEvs.length} منشور مجدول</span></div>

function reschedule(tid,sid){
  const t=store.tasks.find(x=>x.id===tid),st=t.stages.find(s=>s.id===sid);
  const nd=prompt('تأجيل النشر إلى تاريخ آخر (YYYY-MM-DD):',st.publishDate);
  if(nd&&/^\d{4}-\d{2}-\d{2}$/.test(nd)){st.publishDate=nd;addNotif('deadline','تم تأجيل النشر','"'+t.title+'" → '+nd);save();
    const day=parseInt(nd.split('-')[2]);if(nd.startsWith('2026-06'))calSelDay=day;render();}
  else if(nd!==null)alert('صيغة التاريخ غير صحيحة. استخدم YYYY-MM-DD');
}
function addEventOnDay(ds){
  // إنشاء تاسك مبسّط بمرحلة نشر في هذا اليوم
  const title=prompt('اسم المنشور / المهمة:');if(!title||!title.trim())return;
  const link=prompt('رابط المنشور (اختياري):')||'';
  const task={id:'t'+Date.now(),brand:'academy',title:title.trim(),desc:'أُضيف من التقويم',due:ds,priority:'normal',coordinator:store.currentUser,coordNote:'',coordLink:'',
    stages:[{id:'s1',kind:'publish',person:store.currentUser,state:'working',text:'',note:link,link:link,publishDate:ds}]};
  store.tasks.unshift(task);addNotif('assign','منشور جديد بالتقويم',title.trim()+' — '+ds);save();
  const day=parseInt(ds.split('-')[2]);if(ds.startsWith('2026-06'))calSelDay=day;render();
}
function viewAnalytics(){
  const tasks=getVisibleTasks();
  // إحصائيات حسب البراند
  const byBrand={academy:{total:0,done:0},zone:{total:0,done:0}};
  // إحصائيات حسب الموظف
  const byUser={};store.team.forEach(u=>byUser[u.id]={total:0,done:0});
  // توزيع الأولويات
  const byPrio={normal:0,medium:0,critical:0};
  tasks.forEach(t=>{
    byBrand[t.brand].total++;byPrio[t.priority]++;
    const allDone=t.stages.every(s=>['done','approved'].includes(s.state));
    if(allDone)byBrand[t.brand].done++;
    t.stages.forEach(st=>{if(st.person&&byUser[st.person]){byUser[st.person].total++;if(['done','approved'].includes(st.state))byUser[st.person].done++;}});
  });
  // أكثر الموظفين إنتاجاً
  const topUsers=store.team.map(u=>({u,...byUser[u.id]})).filter(x=>x.total>0).sort((a,b)=>b.done-a.done);
  const maxDone=Math.max(...topUsers.map(x=>x.done),1);
  // حالات المهام
  const stateCount={};Object.keys(NSTATE).forEach(k=>stateCount[k]=0);
  tasks.forEach(t=>t.stages.forEach(s=>stateCount[s.state]++));

  return `<div class="an-grid">
    <div class="panel fade-up">
      <div class="panel-head"><h3>الإنتاج حسب الجهة</h3></div>
      ${Object.entries(byBrand).map(([k,v])=>{const b=BRANDS[k];const pct=v.total?Math.round(v.done/v.total*100):0;
        return `<div class="an-brand"><div class="an-brand-top"><span class="chip" style="background:${b.soft};color:${b.color}">${icon(b.ico,13)} ${b.name}</span><b>${v.done}/${v.total} مكتملة</b></div><div class="an-track"><div class="an-fill" style="width:${pct}%;background:${b.color}"></div></div></div>`;}).join('')}
    </div>
    <div class="panel fade-up">
      <div class="panel-head"><h3>توزيع الأولويات</h3></div>
      <div class="an-prio">${Object.entries(byPrio).map(([k,v])=>{const p=PRIORITIES[k];const tot=tasks.length||1;
        return `<div class="an-prio-item"><div class="an-prio-ring" style="--c:${p.color};--pct:${v/tot*100}"><b>${v}</b></div><span>${icon(p.ico,13)} ${p.name}</span></div>`;}).join('')}</div>
    </div>
  </div>
  <div class="panel fade-up" style="margin-bottom:16px">
    <div class="panel-head"><h3>أكثر الموظفين إنتاجاً</h3><span class="more">${topUsers.length} موظف نشط</span></div>
    <div class="an-users">${topUsers.map((x,i)=>`<div class="an-user">
      <span class="an-rank ${i<3?'top':''}">${i+1}</span>
      <span class="an-av" style="background:${x.u.av}">${x.u.name[0]}</span>
      <div class="an-user-info"><b>${esc(x.u.name)}</b><span>${esc(rAr(x.u.role))}</span></div>
      <div class="an-user-bar"><div class="an-user-fill" style="width:${x.done/maxDone*100}%;background:${x.u.av}"></div></div>
      <span class="an-user-num">${x.done}/${x.total}</span>
    </div>`).join('')}</div>
  </div>
  <div class="panel fade-up">
    <div class="panel-head"><h3>حالات المراحل</h3></div>
    <div class="an-states">${Object.entries(stateCount).filter(([,v])=>v>0).map(([k,v])=>{const ns=NSTATE[k];
      return `<div class="an-state" style="border-color:${ns.color}33"><b style="color:${ns.color}">${v}</b><span>${ns.ar}</span></div>`;}).join('')}</div>
  </div>`;
}

async function saveProfile(){

  const phone=document.getElementById('prof_phone').value.trim();
  const telegram=document.getElementById('prof_telegram').value.trim();

  try{
    if(profileEditId){

    await bootstrapFromSupabase();
    closeProfileModal(); render();
  }catch(e){ toastErr(e); }

function toggleNode(tid,sid){openNode[tid]=openNode[tid]===sid?null:sid;render();}

function findStage(tid,sid){const t=store.tasks.find(x=>x.id===tid);return[t,t.stages.find(s=>s.id===sid)];}
/* تحديث مهمة واحدة (~600 بايت) بدل bootstrapFromSupabase (~8 ميغا عند 2000 مهمة) */
async function refreshTask(tid){
  const { data, error } = await sb.from('tasks').select('*, stages(*)').eq('id', tid).single();
  if(error || !data) return bootstrapFromSupabase();
  (data.stages||[]).sort((a,b)=>a.sort_order-b.sort_order);
  const t = store.tasks.find(x=>x.id===tid); if(!t) return bootstrapFromSupabase();
  t.title=data.title; t.desc=data.description; t.brand=data.brand;
  t.priority=data.priority; t.due=data.due_date||'';
  t.coordNote=data.coord_note; t.coordLink=data.coord_link;
  t.stages=(data.stages||[]).map(g=>({
    id:g.id, kind:g.kind, person:g.assignee, state:g.state,
    text:g.text_content, note:g.note, link:g.link, reason:g.reason,
    publishDate:g.publish_date||'', publishTime:g.publish_time||'',
    lastEditBy:g.last_edit_by, lastEditAt:g.last_edit_at, needsRecheck:g.needs_recheck
  }));
}
const FIELD_MAP={text:'text_content',note:'note',link:'link',
                 publishDate:'publish_date',publishTime:'publish_time'};
async function setNodeField(tid,sid,f,v){
  const [t,st]=findStage(tid,sid);
  st[f]=v;
  try{
    const col=FIELD_MAP[f]; if(!col) return;
    await saveStageEdit(sid,{[col]: v || (col.endsWith('_date')?null:'')});
    await refreshTask(tid);   // تحديث مهمة واحدة بدل إعادة جلب كل شيء
  }catch(e){ toastErr(e); await bootstrapFromSupabase(); }
  render();
}

async function setNodeState(tid,sid,state){
  try{
    await saveStageEdit(sid,{state});
    await refreshTask(tid);
  }catch(e){ toastErr(e); await bootstrapFromSupabase(); }
  render();
}
async function approveNode(tid,sid){
  const [t]=findStage(tid,sid);
  try{
    await approveStage(sid);
    const pub=t.stages.find(x=>(STAGE_KINDS[x.kind]||{}).isPublish);
    if(pub) await saveStageEdit(pub.id,{state:'working'});
    await notify(null,'done','تمت الموافقة','تمت الموافقة على "'+t.title+'" — انتقلت للنشر');
    await bootstrapFromSupabase();
  }catch(e){ toastErr(e); }
  render();
}
async function rejectNode(tid,sid){
  const reason=prompt('سبب الرفض:'); if(reason===null) return;
  const [t]=findStage(tid,sid);

    await rejectStage(sid,reason);
    await notify(null,'reject','تم رفض المهمة','"'+t.title+'": '+reason);

async function tSubmit(){
  const title=document.getElementById('tk_title').value.trim()||'تاسك جديد';
  const desc=document.getElementById('tk_desc').value.trim();
  const due=document.getElementById('tk_due').value;
  const pubDate=document.getElementById('tk_pub')?document.getElementById('tk_pub').value:'';
  const coordNote=document.getElementById('tk_note').value.trim();
  const coordLink=document.getElementById('tk_link').value.trim();

  try{
    if(tEditId){
      // تعديل بيانات المهمة فقط (المراحل تُدار من الخريطة)
      const { error } = await sb.from('tasks').update({
        title, description:desc, brand:tForm.brand, priority:tForm.priority,
        due_date: due||null, coord_note:coordNote, coord_link:coordLink
      }).eq('id', tEditId);
      if(error) throw new Error(error.message);
    }else{
      const t = await createTask({
        title, desc, brand:tForm.brand, priority:tForm.priority, due,
        coordNote, coordLink, isPartnership: !!tForm.isPartnership
      }, tForm.stages);
      if(pubDate){
        const rows = await sb.from('stages').select('id,kind').eq('task_id', t.id);

        if(pub) await saveStageEdit(pub.id,{publish_date:pubDate});
      }
      await notify(null,'assign','مهمة جديدة', title);
    }
    await bootstrapFromSupabase();
    closeTaskModal(); render();
  }catch(e){ toastErr(e); }
}

      <div class="fld"><label>ملاحظة الكوردنيتر (اختياري)</label><textarea id="tk_note" placeholder="توجيهات للفريق">${esc(tForm.coordNote)}</textarea></div>
      <div class="fld"><label>رابط مرجعي (اختياري)</label><input id="tk_link" value="${esc(tForm.coordLink)}" placeholder="drive.google.com/..."></div>
      <div class="stage-builder">
        <div class="sb-title">${icon('maps',14)} مراحل الخريطة — اختر القسم والشخص لكل مرحلة</div>
        <div class="sb-list">${tForm.stages.map((st,i)=>`<div class="sb-row"><span class="sb-num">${i+1}</span>
          <select onchange="tStageKind(${i},this.value)">${allKinds.map(([k,v])=>`<option value="${k}" ${st.kind===k?'selected':''}>${v.ar}</option>`).join('')}</select>
          <select onchange="tStagePerson(${i},this.value)"><option value="">— اختر الشخص —</option>${store.team.map(u=>`<option value="${u.id}" ${st.person===u.id?'selected':''}>${esc(u.name)} (${u.role})</option>`).join('')}</select>
          <button class="sb-del" onclick="tDelStage(${i})">${icon("cross",15)}</button></div>`).join('')}</div>
        <button class="sb-add" onclick="tAddStage()">+ إضافة مرحلة</button>
      </div>
    </div>
    <div class="modal-foot"><span style="font-size:12px;color:var(--ink-400)">${tForm.stages.length} مراحل</span><button class="pill-blue" onclick="tSubmit()">${icon('check',14)} ${isEdit?'حفظ التعديلات':'إنشاء التاسك وخريطته'}</button></div>
  </div></div>`;
}
const META={home:['لوحة التحكم','مرحباً، إليك نظرة عامة على أداء الإنتاج اليوم'],maps:['خرائط المهام','كل تاسك خريطته الخاصة — اضغط أي مرحلة لفتحها وإضافة محتواها'],partnerships:['الشراكات','المهام المخصصة للشركات الخارجية وشركاء مرماز'],sheet:['الشيت','جدول المهام والتفاصيل الخاصة للأساتذة'],mytasks:['مهامي','المراحل المعيّنة لك عبر كل المهام'],personal:['مهامي الخاصة','مساحة شخصية معزولة — يراها صاحبها فقط'],calendar:['تقويم النشر','مواعيد النشر تتزامن تلقائياً من خرائط المهام'],chat:['المحادثة','دردشة الفريق مدعومة بـ Microsoft Teams — مشفّرة وآمنة'],analytics:['التقارير والتحليلات','أداء الفريق والإنتاج حسب الجهة والأولوية'],team:['الفريق','كل موظف وإحصائياته ومهامه'],notifications:['الإشعارات','آخر التنبيهات والتحديثات'],settings:['إعدادات المانيجر','إدارة الموظفين والأقسام المتاحة']};

function enterPublicDashboard() {
  try {
    page = 'public_dashboard';
    var ls = document.getElementById('loginScreen');
    if(ls) ls.style.display = 'none';
    var sh = document.querySelector('.shell');
    if(sh) sh.style.display = 'none';
    var pd = document.getElementById('publicDashboard');
    if(pd) pd.style.display = 'block';
    renderPublicDashboard();
    
    loadBoardPublic();
    
    if(window.dashboardInterval) clearInterval(window.dashboardInterval);
    window.dashboardInterval = setInterval(function() {
      if(page === 'public_dashboard') {
        loadBoardPublic();
      } else {
        clearInterval(window.dashboardInterval);
      }
    }, 5000);
  } catch(err) {
    console.error('enterPublicDashboard error:', err);
    alert('خطأ في فتح لوحة العرض: ' + err.message);
  }
}

function exitPublicDashboard() {
  page = 'home';
  if(window.dashboardInterval) clearInterval(window.dashboardInterval);
  if(opsClockTimer){ clearInterval(opsClockTimer); opsClockTimer=null; }
  document.getElementById('publicDashboard').style.display = 'none';
  if(!store.currentUser) {
    document.getElementById('loginScreen').style.display = 'flex';
  } else {
    document.querySelector('.shell').style.display = 'flex';
    render();
  }
}

window.addEventListener('storage', (e) => {
  if (e.key === KEY) {
    try {
      store = JSON.parse(e.newValue);
      if(page === 'public_dashboard') {
        renderPublicDashboard();
      } else {
        render();
      }
    } catch(err) {}
  }
});

/* ============================================================
   لوحة العرض — تحتاج جلسة صالحة (RLS يمنع القراءة بلا مصادقة).
   سجّل دخول حساب العرض مرة واحدة على شاشة الماركتنك وستبقى الجلسة.
   ============================================================ */
let boardSub=null;
async function loadBoardPublic(){
  try{
    const ok = await initSession();
    if(!ok){
      document.getElementById('dashboardTableContainer').innerHTML =
        '<div class="ops-none">تحتاج تسجيل دخول لعرض اللوحة —'+
        ' سجّل دخول حساب العرض مرة واحدة على هذه الشاشة.</div>';
      document.getElementById('opsKpis').innerHTML='';
      return;
    }
    await bootstrapFromSupabase();
    renderPublicDashboard();
    if(!boardSub) boardSub = subscribeBoard(async ()=>{
      await bootstrapFromSupabase(); renderPublicDashboard();
    });
  }catch(e){
    console.warn('board load failed:', e);
    document.getElementById('dashboardTableContainer').innerHTML =
      '<div class="ops-none">تعذّر تحميل البيانات</div>';
  }
}

function opsClockTick(){
  const el=document.getElementById('opsClock'); if(!el) return;
  const d=new Date();
  el.textContent=d.toLocaleDateString('ar-IQ',{weekday:'long',day:'numeric',month:'long'})+
    ' — '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
let opsClockTimer=null;

const OPS_COLS=[
  {name:'النصوص',  kinds:['caption','textdesign']},
  {name:'التصاميم',kinds:['design']},
  {name:'المونتاج',kinds:['video']},
  {name:'التدقيق', kinds:['review']},
  {name:'الموافقة',kinds:['approval']},
  {name:'النشر',   kinds:['publish']},
];

function opsCellState(stages){
  if(stages.every(s=>['done','approved','published'].includes(s.state))) return 'done';
  if(stages.some(s=>s.state==='rejected'))  return 'rejected';
  if(stages.some(s=>s.state==='approval'))  return 'approval';
  if(stages.some(s=>s.state==='working'))   return 'working';
  return 'pending';
}
function opsBox(state){
  if(state==='done')     return `<div class="ops-box done" title="مُنجز">${icon('check',15)}</div>`;
  if(state==='working')  return `<div class="ops-box working" title="قيد العمل"><span class="ops-pulse-dot"></span></div>`;
  if(state==='approval') return `<div class="ops-box approval" title="بانتظار الموافقة">${icon('hourglass',14,'ops-hourglass')}</div>`;
  if(state==='rejected') return `<div class="ops-box rejected" title="مرفوض">${icon('cross',15)}</div>`;
  return `<div class="ops-box pending" title="بالانتظار">${icon('dot',10)}</div>`;
}

function renderPublicDashboard(){
  const container=document.getElementById('dashboardTableContainer');
  if(!container) return;
  const tasks=(store.tasks||[]).filter(t=>!t.isPartnership);

  /* --- شريط البراندات --- */
  const legendEl=document.getElementById('dashboardBrandLegend');
  if(legendEl){
    const counts={};
    tasks.forEach(t=>{counts[t.brand]=(counts[t.brand]||0)+1;});
    legendEl.innerHTML=Object.entries(BRANDS).map(([k,b])=>{
      const c=counts[k]||0;
      if(!c) return '';
      return `<span class="dash-brand-badge ${k}">${icon(b.ico,12)} ${esc(b.name)} <span style="opacity:.65">(${c})</span></span>`;
    }).join('');
  }

  /* --- المؤشرات (KPI) --- */
  const kpiEl=document.getElementById('opsKpis');
  if(kpiEl){
    let done=0,working=0,approval=0,crit=0;
    tasks.forEach(t=>{
      const sts=t.stages||[];
      if(sts.length && sts.every(s=>['done','approved','published'].includes(s.state))) done++;
      if(sts.some(s=>s.state==='working')) working++;
      if(sts.some(s=>s.state==='approval')) approval++;
      if(t.priority==='critical') crit++;
    });
    const kpis=[
      {v:tasks.length,l:'إجمالي المهام', c:'#7DB0FF', i:'clipboard'},
      {v:working,     l:'قيد العمل',     c:'#38BDF8', i:'play'},
      {v:approval,    l:'بانتظار الموافقة',c:'#FBBF24', i:'hourglass'},
      {v:done,        l:'مكتملة',        c:'#34E3A8', i:'checkCircle'},
      {v:crit,        l:'أولوية قصوى',   c:'#FB7185', i:'prioCritical'},
    ];
    kpiEl.innerHTML=kpis.map((k,idx)=>`
      <div class="ops-kpi" style="--k:${k.c};animation-delay:${idx*70}ms">
        <div class="ops-kpi-top"><div class="ops-kpi-ico">${icon(k.i,17)}</div></div>
        <b>${k.v}</b><span>${k.l}</span>
      </div>`).join('');
  }

  /* --- الجداول --- */
  const mid=Math.ceil(tasks.length/2);
  const renderTable=list=>{
    if(!list.length) return '<div class="ops-none">لا توجد مهام</div>';
    return `<table class="ops-table">
      <thead><tr>
        <th>المهمة</th>
        ${OPS_COLS.map(c=>`<th class="c">${esc(c.name)}</th>`).join('')}
      </tr></thead>
      <tbody>${list.map(t=>{
        const b=BRANDS[t.brand]||{name:'غير معروف',ico:'tag',color:'#8093B2'};
        return `<tr>
          <td style="max-width:230px">
            <div class="ops-task">
              <div class="ops-accent" style="--b:${b.color}"></div>
              <div class="ops-task-info">
                <div class="ops-task-title" title="${esc(t.title)}">${esc(t.title)}</div>
                <div class="ops-task-meta">
                  <span class="dash-brand-badge ${esc(t.brand)}">${icon(b.ico,12)} ${esc(b.name)}</span>
                  ${t.due?`<span class="ops-due">${icon('timer',12)} ${esc(t.due)}</span>`:''}
                </div>
              </div>
            </div>
          </td>
          ${OPS_COLS.map(c=>{
            const sts=(t.stages||[]).filter(s=>c.kinds.includes(s.kind));
            if(!sts.length) return '<td class="ops-cell"><span class="ops-empty-cell">—</span></td>';
            return `<td class="ops-cell">${opsBox(opsCellState(sts))}</td>`;
          }).join('')}
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  };

  container.innerHTML =
    `<div class="ops-panel">${renderTable(tasks.slice(0,mid))}</div>`+
    `<div class="ops-panel">${renderTable(tasks.slice(mid))}</div>`;

  opsClockTick();
  if(!opsClockTimer) opsClockTimer=setInterval(opsClockTick,30000);
}

function render(){renderNav();
  if(!store.currentUser && page !== 'public_dashboard') {
    document.querySelector('.shell').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    return;
  } else {
    if(page === 'public_dashboard') {
      document.querySelector('.shell').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('publicDashboard').style.display = 'block';
      renderPublicDashboard();
      return;
    } else {
      document.querySelector('.shell').style.display = 'flex';
      const ls = document.getElementById('loginScreen');
      if(ls) ls.style.display = 'none';
      const pd = document.getElementById('publicDashboard');
      if(pd) pd.style.display = 'none';
    }
  }
renderSummary();
  const unread=store.notifications?store.notifications.filter(n=>!n.read).length:0;
  const bd=document.getElementById('bellDot');if(bd){if(unread){bd.textContent=unread;bd.style.display='grid';}else bd.style.display='none';}
  document.getElementById('pageTitle').textContent=META[page][0];document.getElementById('pageSub').textContent=META[page][1];const v=document.getElementById('view');if(page==='home')v.innerHTML=viewHome();else if(page==='maps')v.innerHTML=viewMaps();else if(page==='partnerships')v.innerHTML=viewPartnerships();else if(page==='sheet')v.innerHTML=viewSheet();else if(page==='mytasks')v.innerHTML=viewMyTasks();else if(page==='personal')v.innerHTML=viewPersonal();else if(page==='calendar')v.innerHTML=viewCalendar();else if(page==='chat')v.innerHTML=viewChat();else if(page==='analytics')v.innerHTML=viewAnalytics();else if(page==='team')v.innerHTML=viewTeam();else if(page==='notifications')v.innerHTML=viewNotifications();else if(page==='settings')v.innerHTML=viewSettings();}
render();
</script>
