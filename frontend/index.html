<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mirmaz FLOW</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2563EB">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue-600:#2563EB;--blue-500:#3B6FF0;--blue-400:#6090F5;--blue-300:#9DBBFA;--blue-100:#DCE7FD;--blue-50:#EFF4FE;
  --blue-grad:linear-gradient(135deg,#3B6FF0 0%,#1E47C9 100%);
  --ink-900:#101729;--ink-700:#222C42;--ink-600:#3A4866;--ink-500:#5A6783;--ink-400:#8A95AC;--ink-300:#B4BDD0;
  --bg:#F4F6FB;--surface:#fff;--surface-2:#F7F9FD;--line:#EDF0F7;
  --green-ok:#16B981;--green-soft:#E7F8F1;--amber:#F59E0B;--amber-soft:#FEF4E2;--red:#F43F5E;--red-soft:#FEE9EC;--violet:#7C5CFC;--violet-soft:#EFEAFE;--cyan:#0EA5E9;--cyan-soft:#E5F4FD;
  --academy:#2563EB;--academy-soft:#DCE7FD;--zone:#7C3AED;--zone-soft:#EDE5FE;
  --r-sm:12px;--r-md:16px;--r-lg:22px;--r-xl:28px;
  --shadow-sm:0 1px 3px rgba(20,40,90,.05),0 1px 2px rgba(20,40,90,.04);
  --shadow-md:0 6px 20px rgba(20,40,90,.06);
  --shadow-lg:0 20px 50px rgba(20,40,90,.12);--shadow-blue:0 10px 26px rgba(37,99,235,.28);
  --glass:rgba(255,255,255,.8);--glass-line:rgba(255,255,255,.6);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Cairo',system-ui,sans-serif;background:var(--bg);color:var(--ink-900);direction:rtl;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{text-decoration:none;color:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#D4DCEA;border-radius:20px}
::-webkit-scrollbar-track{background:transparent}
.ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.ambient span{position:absolute;border-radius:50%;filter:blur(65px);opacity:.4;animation:float 18s ease-in-out infinite}
.ambient span:nth-child(1){width:420px;height:420px;background:#BFD2FF;top:-120px;right:-80px}
.ambient span:nth-child(2){width:360px;height:360px;background:#E0D2FF;bottom:-120px;left:8%;animation-delay:-6s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,30px) scale(1.08)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.glass{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--glass-line)}
.fade-up{animation:fadeUp .45s cubic-bezier(.2,.7,.2,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.shell{display:flex;height:100vh;position:relative;z-index:1;gap:0}
.sidebar { padding-bottom: 80px; width:248px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--line);display:flex;flex-direction:column;padding:22px 16px;height:100vhoverflow-y: auto; overflow-x: hidden;}
.sb-logo{display:flex;align-items:center;gap:11px;padding:6px 10px 22px;justify-content:flex-end}
.sb-logo-text{text-align:right;line-height:1.1}
.sb-logo-text b{font-size:19px;font-weight:800;display:block}
.sb-logo-text span{font-size:11px;color:var(--ink-400);font-weight:600;letter-spacing:2px}
.logo-mark{width:42px;height:42px;border-radius:12px;background:var(--blue-grad);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow-blue)}
.logo-mark svg{width:26px;height:26px}
.sb-nav{display:flex;flex-direction:column;gap:4px;flex:1;margin-top:8px}
.sb-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;color:var(--ink-500);font-size:14px;font-weight:700;transition:all .18s;text-align:right}
.sb-btn svg{width:20px;height:20px;flex-shrink:0}
.sb-btn:hover{background:var(--surface-2);color:var(--ink-900)}
.sb-btn.on{background:var(--blue-grad);color:#fff;box-shadow:var(--shadow-blue)}
.sb-summary{margin-top:14px;border-radius:var(--r-md);padding:16px}
.sb-summary h5{font-size:11px;font-weight:700;color:var(--ink-400);margin-bottom:12px;text-align:right}
.sb-sum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.sb-sum-row:last-child{margin-bottom:0}
.sb-sum-row span{font-size:12px;color:var(--ink-500);font-weight:600}
.sb-sum-row b{font-size:14px;font-weight:800}
.sb-sum-bar{height:6px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:10px}
.sb-sum-fill{height:100%;border-radius:6px;background:var(--blue-grad);transition:width .6s}

/* ===== نظام البوكسات الزجاجية اللامعة (Glossy / Glass) ===== */
.glass-card{position:relative;background:linear-gradient(145deg,rgba(255,255,255,.92),rgba(247,249,253,.82));backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.7);box-shadow:0 4px 24px rgba(20,40,90,.06),inset 0 1px 0 rgba(255,255,255,.9);overflow:hidden}
.glass-card::before{content:"";position:absolute;top:0;left:0;right:0;height:42%;background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,0));pointer-events:none;z-index:0}
.glass-card>*{position:relative;z-index:1}

/* لمعان متحرك عند المرور */
.glossy{position:relative;overflow:hidden}
.glossy::after{content:"";position:absolute;top:0;left:-120%;width:80%;height:100%;background:linear-gradient(110deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-18deg);transition:left .7s cubic-bezier(.2,.7,.2,1);pointer-events:none;z-index:2}
.glossy:hover::after{left:130%}

.main{flex:1;display:flex;flex-direction:column;gap:0;min-width:0;height:100vh}
.topbar{height:74px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 26px}
.role-switch{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:11px}
.role-switch button{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:700;color:var(--ink-400);transition:all .2s}
.role-switch button.on{background:var(--blue-grad);color:#fff;box-shadow:var(--shadow-sm)}
.searchbar{flex:1;max-width:380px;height:42px;display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--surface-2);border-radius:13px;color:var(--ink-400);border:1px solid transparent;transition:all .2s}
.searchbar:focus-within{border-color:var(--blue-300);background:#fff}
.searchbar input{flex:1;border:none;outline:none;background:none;font-size:13.5px;color:var(--ink-900)}
.top-actions{display:flex;align-items:center;gap:12px;margin-right:auto}
.icon-btn{position:relative;width:42px;height:42px;border-radius:12px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-500);transition:all .2s}
.icon-btn:hover{background:var(--blue-50);color:var(--blue-600)}
.icon-btn .dot{position:absolute;top:7px;right:8px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--red);color:#fff;font-size:9px;font-weight:800;display:grid;place-items:center;border:2px solid #fff}
.me{display:flex;align-items:center;gap:10px;padding:5px 6px 5px 12px;border-radius:13px;background:var(--surface-2);flex-direction:row-reverse}
.me-av{width:38px;height:38px;border-radius:11px;background:var(--blue-grad);color:#fff;display:grid;place-items:center;font-weight:700}
.me-info{display:flex;flex-direction:column;line-height:1.3;text-align:right}
.me-info b{font-size:13px}.me-info span{font-size:11px;color:var(--ink-400)}
.content{flex:1;overflow-y:auto;padding:26px}
.page-title{font-size:25px;font-weight:800;margin-bottom:5px}
.page-sub{font-size:13.5px;color:var(--ink-400);margin-bottom:22px}

.pill-blue{height:44px;padding:0 20px;border-radius:14px;background:var(--blue-grad);color:#fff;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:7px;box-shadow:var(--shadow-blue);transition:transform .2s}
.pill-blue:hover{transform:translateY(-2px)}
.pill-blue:disabled{opacity:.45;cursor:not-allowed;transform:none}
.pill-ghost{height:44px;padding:0 18px;border-radius:14px;background:var(--surface);border:1px solid var(--line);font-weight:600;font-size:13px;color:var(--ink-700);box-shadow:var(--shadow-sm);display:inline-flex;align-items:center;gap:7px}
.btn-sm{height:36px;padding:0 14px;border-radius:11px;font-size:12.5px;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-green{background:#21C07a18;color:var(--green-ok)}.btn-green:hover{background:var(--green-ok);color:#fff}
.btn-red{background:#FF547018;color:var(--red)}.btn-red:hover{background:var(--red);color:#fff}
.btn-amber{background:#F6A60918;color:var(--amber)}.btn-amber:hover{background:var(--amber);color:#fff}
.btn-blue{background:var(--blue-50);color:var(--blue-600)}.btn-blue:hover{background:var(--blue-grad);color:#fff}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;white-space:nowrap}
.chip-crit{background:var(--red);color:#fff;animation:badgePulse 1.2s ease-in-out infinite}
@keyframes badgePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.78;transform:scale(1.05)}}
@keyframes critFrame{0%,100%{box-shadow:0 0 0 3px rgba(255,84,112,.12),0 14px 36px rgba(255,84,112,.20)}50%{box-shadow:0 0 0 6px rgba(255,84,112,.05),0 14px 40px rgba(255,84,112,.30)}}

/* ===== الصفحة الرئيسية ===== */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
.stat{background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:18px;box-shadow:var(--shadow-sm);transition:all .2s}
.stat:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-ico{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:19px}
.stat-delta{font-size:11px;font-weight:800;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:3px}
.stat-delta.up{background:var(--green-soft);color:var(--green-ok)}
.stat-delta.down{background:var(--red-soft);color:var(--red)}
.stat b{font-size:26px;font-weight:800;display:block;line-height:1}
.stat span{font-size:12.5px;color:var(--ink-400);font-weight:600}
.home-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:22px}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.panel-head h3{font-size:16px;font-weight:800}
.panel-head .more{font-size:12.5px;font-weight:700;color:var(--blue-600)}
.funnel{display:flex;flex-direction:column;gap:9px}
.fn-row{display:flex;align-items:center;gap:12px}
.fn-bar{flex:1;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:13px;font-weight:700;color:#fff}
.fn-side{width:90px;text-align:left;font-size:12px;color:var(--ink-500);font-weight:700}
.act-list{display:flex;flex-direction:column;gap:4px}
.act{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:11px;transition:background .15s}
.act:hover{background:var(--surface-2)}
.act-ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:15px;flex-shrink:0}
.act-body{flex:1}
.act-body b{font-size:13.5px;font-weight:700;display:block}
.act-body span{font-size:11.5px;color:var(--ink-400)}
.act-time{font-size:11px;color:var(--ink-300);font-weight:600}
.ring-row{display:flex;gap:14px;justify-content:space-around}
.ring{text-align:center}
.ring svg{transform:rotate(-90deg)}
.ring .rval{font-size:18px;font-weight:800}
.ring p{font-size:11.5px;color:var(--ink-400);font-weight:600;margin-top:8px}

.maps-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.maps-count{font-size:15px;color:var(--ink-500);display:flex;align-items:center;gap:12px}
.maps-count strong{font-size:22px;font-weight:800;color:var(--ink-900)}
.crit-tag{font-size:12px;font-weight:800;color:var(--red);background:#FF547014;padding:5px 12px;border-radius:20px}
.maps-grid{display:grid;grid-template-columns:1fr;gap:18px}

.tmap{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);overflow:hidden;border-right:5px solid var(--brand);transition:box-shadow .25s}
.tmap.crit{border:1px solid var(--line);border-right:5px solid var(--red)}
.tmap:hover{box-shadow:var(--shadow-md)}
.tmap-head{display:flex;align-items:flex-start;gap:14px;padding:20px 22px;flex-wrap:wrap}
.tmap-head-main{flex:1;min-width:200px}
.tmap-chips{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.tmap-title{font-size:18px;font-weight:800;margin-bottom:6px}
.tmap-desc{font-size:13px;color:var(--ink-500);line-height:1.6}
.tmap-side{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.tmap-tools{display:flex;gap:6px;margin-top:4px}
.tmap-tool{width:34px;height:34px;border-radius:10px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-500);transition:all .2s}
.tmap-tool.edit:hover{background:var(--blue-grad);color:#fff}
.tmap-tool.postpone:hover{background:var(--amber);color:#fff}
.tmap-tool.del:hover{background:var(--red);color:#fff}
.tmap-due{font-size:12.5px;color:var(--ink-500);font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:6px}
.tmap-coord{font-size:11.5px;color:var(--ink-400)}

.flow{display:flex;align-items:flex-start;gap:0;padding:18px 22px 26px;overflow-x:auto}
.cnode{position:relative;flex-shrink:0;width:118px;display:flex;flex-direction:column;align-items:center;gap:10px}
/* خط الوصل بين الدوائر */
.cnode-line{position:absolute;top:33px;left:0;width:calc(50% - 0px);height:3px;background:var(--line);z-index:0;border-radius:3px;transition:background .4s}
.cnode-line.before{left:auto;right:0}
.cnode-line.done{background:var(--green-ok)}
.cnode:first-child .cnode-line.before{display:none}
.cnode:last-child .cnode-line.after{display:none}

/* الدائرة */
.cnode-circle{position:relative;z-index:2;width:66px;height:66px;border-radius:50%;display:grid;place-items:center;cursor:pointer;background:#fff;border:3px solid var(--line);transition:all .35s cubic-bezier(.34,1.56,.64,1)}
.cnode-circle .cn-ico{color:var(--ink-400);opacity:.5;transition:all .35s}
.cnode-circle .cn-ico svg{width:27px;height:27px}
.cnode-circle .cn-state{position:absolute;bottom:-3px;left:-3px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff;border:2.5px solid #fff;transform:scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.cnode-circle .cn-state svg{width:12px;height:12px;stroke-width:2.5}

/* الحالات: باهت (منجز/منتظر) و بارز (جاري) */
.cnode.done .cnode-circle{border-color:var(--green-ok);background:color-mix(in srgb,var(--green-ok) 8%,#fff)}
.cnode.done .cn-ico{color:var(--c);opacity:.9}
.cnode.done .cn-state{transform:scale(1)}
.cnode.pending .cnode-circle{border-color:var(--line);background:var(--surface-2)}
.cnode.pending .cn-ico{color:var(--ink-300);opacity:.45}

/* الجاري — ملوّن وبارز ونابض */
.cnode.active-stage .cnode-circle{border-color:var(--c);background:color-mix(in srgb,var(--c) 12%,#fff);box-shadow:0 0 0 0 color-mix(in srgb,var(--c) 50%,transparent);animation:cnPulse 1.8s ease-in-out infinite;transform:scale(1.12)}
.cnode.active-stage .cn-ico{color:var(--c);opacity:1;transform:scale(1.08)}
.cnode.active-stage .cn-state{transform:scale(1)}
@keyframes cnPulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--c) 45%,transparent)}70%{box-shadow:0 0 0 14px color-mix(in srgb,var(--c) 0%,transparent)}100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--c) 0%,transparent)}}

/* الرفض */
.cnode.rejected .cnode-circle{border-color:var(--red);background:color-mix(in srgb,var(--red) 10%,#fff);animation:cnShake .5s}
.cnode.rejected .cn-ico{color:var(--red);opacity:1}
.cnode.rejected .cn-state{transform:scale(1)}
@keyframes cnShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* hover + المختار */
.cnode-circle:hover{transform:scale(1.16);border-color:var(--c)}
.cnode.active-stage .cnode-circle:hover{transform:scale(1.2)}
.cnode.opened .cnode-circle{border-color:var(--c);box-shadow:0 8px 22px color-mix(in srgb,var(--c) 30%,transparent)}
.cnode.opened .cn-ico{color:var(--c);opacity:1}

/* الاسم + الشخص */
.cnode-label{text-align:center;display:flex;flex-direction:column;gap:3px;transition:opacity .35s}
.cnode.pending .cnode-label{opacity:.55}
.cnode-name{font-size:11.5px;font-weight:800;color:var(--ink-900);line-height:1.3;max-width:108px}
.cnode-person{font-size:10px;color:var(--ink-400);font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px}
.cnode-person .cn-av{width:15px;height:15px;border-radius:5px;color:#fff;display:grid;place-items:center;font-size:8px;font-weight:800}
.cnode-noperson{font-size:10px;color:var(--ink-300);font-style:italic}

.node-panel{margin:0 22px 22px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:18px;animation:fadeUp .3s both}
.np-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.np-title{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800}
.np-title .dot{width:10px;height:10px;border-radius:50%}
.np-close{width:30px;height:30px;border-radius:9px;background:#fff;display:grid;place-items:center;color:var(--ink-400);font-size:15px}
.np-close:hover{background:#FF547018;color:var(--red)}
.np-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.np-field{flex:1;min-width:180px;display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.np-field label{font-size:12px;font-weight:700;color:var(--ink-500)}
.np-field input,.np-field select,.np-field textarea{border:1.5px solid var(--line);border-radius:11px;padding:10px 12px;font-size:13.5px;color:var(--ink-900);background:#fff;transition:all .2s}
.np-field textarea{min-height:90px;resize:vertical;line-height:1.6}
.np-field input:focus,.np-field select:focus,.np-field textarea:focus{outline:none;border-color:var(--blue-400)}
.np-content{background:#fff;border:1px dashed var(--line);border-radius:11px;padding:13px;font-size:13px;color:var(--ink-600);line-height:1.7;margin-bottom:12px;white-space:pre-wrap}
.np-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--blue-600);background:var(--blue-50);padding:7px 12px;border-radius:10px;margin-top:8px}
.np-actions{display:flex;gap:8px;flex-wrap:wrap}
.np-reject{background:#FF54700a;border:1px solid #FF547030;border-radius:11px;padding:12px;margin-top:10px}
.np-reject label{color:var(--red)}

.mylist{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.myitem{background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:16px;box-shadow:var(--shadow-sm);border-right:4px solid var(--c);transition:all .2s}
.myitem:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.myitem-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.myitem h4{font-size:14.5px;font-weight:800;margin-bottom:4px}
.myitem-task{font-size:12px;color:var(--ink-400);margin-bottom:12px}
.myitem-foot{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--line)}
.empty{padding:50px;text-align:center;color:var(--ink-400);font-size:14px}

.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.set-card{padding:22px}
.set-card h3{font-size:17px;font-weight:800;margin-bottom:4px}
.set-card p{font-size:12.5px;color:var(--ink-400);margin-bottom:16px}
.set-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.set-row{display:flex;align-items:center;gap:10px;background:var(--surface-2);border-radius:12px;padding:10px 14px}
.set-row .ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:14px;flex-shrink:0}
.set-row .nm{flex:1;font-size:13.5px;font-weight:700}
.set-row .rl{font-size:11.5px;color:var(--ink-400);font-weight:500}
.set-del{width:28px;height:28px;border-radius:8px;background:#fff;color:var(--ink-400);display:grid;place-items:center;font-size:14px}
.set-del:hover{background:#FF547018;color:var(--red)}
.set-add{display:flex;gap:8px}
.set-add input,.set-add select{flex:1;height:42px;border:1.5px solid var(--line);border-radius:11px;padding:0 12px;font-size:13px;background:var(--surface-2)}
.set-add input:focus,.set-add select:focus{outline:none;border-color:var(--blue-400);background:#fff}

.ov{position:fixed;inset:0;z-index:100;background:rgba(11,18,32,.42);backdrop-filter:blur(6px);display:grid;place-items:center;padding:20px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:640px;max-height:92vh;overflow-y:auto;background:#fff;border-radius:var(--r-xl);box-shadow:var(--shadow-lg);animation:pop .3s cubic-bezier(.2,.7,.2,1)}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:22px 24px 14px}
.modal-head h2{font-size:19px;font-weight:800}
.modal-close{width:36px;height:36px;border-radius:11px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-500);font-size:18px}
.modal-close:hover{background:#FF547018;color:var(--red)}
.modal-body{padding:4px 24px 8px}
.modal-foot{display:flex;justify-content:space-between;align-items:center;padding:16px 24px 22px;border-top:1px solid var(--line);margin-top:12px}
.fld{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.fld label{font-size:12.5px;font-weight:700;color:var(--ink-500)}
.fld input,.fld select,.fld textarea{height:44px;border:1.5px solid var(--line);border-radius:12px;padding:0 14px;font-size:14px;color:var(--ink-900);background:var(--surface-2);transition:all .2s}
.fld textarea{height:auto;min-height:80px;padding:12px 14px;resize:vertical;line-height:1.6}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--blue-400);background:#fff}
.fld-row{display:flex;gap:12px}
.fld-row .fld{flex:1}

.stage-builder{border:1px solid var(--line);border-radius:var(--r-md);padding:16px;background:var(--surface-2);margin-bottom:14px}
.sb-title{font-size:13px;font-weight:800;color:var(--ink-700);margin-bottom:12px}
.sb-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.sb-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:8px 10px}
.sb-num{width:24px;height:24px;border-radius:7px;background:var(--blue-50);color:var(--blue-600);display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0}
.sb-row select{flex:1;height:38px;border:1px solid var(--line);border-radius:9px;padding:0 10px;font-size:12.5px;background:var(--surface-2);min-width:0}
.sb-row .sb-del{width:30px;height:30px;border-radius:8px;background:var(--surface-2);color:var(--ink-400);display:grid;place-items:center;font-size:14px;flex-shrink:0}
.sb-row .sb-del:hover{background:#FF547018;color:var(--red)}
.sb-add{width:100%;height:40px;border:1.5px dashed var(--blue-300);border-radius:11px;color:var(--blue-600);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.sb-add:hover{background:var(--blue-50)}

.sb-badge{margin-right:auto;background:var(--red);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;padding:0 6px;border-radius:10px;display:grid;place-items:center}
.sb-btn.on .sb-badge{background:#fff;color:var(--blue-600)}

/* التحليلات */
.an-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:16px}
.an-brand{margin-bottom:16px}
.an-brand:last-child{margin-bottom:0}
.an-brand-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.an-brand-top b{font-size:13px;color:var(--ink-600)}
.an-track{height:10px;border-radius:8px;background:var(--surface-2);overflow:hidden}
.an-fill{height:100%;border-radius:8px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
.an-prio{display:flex;justify-content:space-around;align-items:center;padding:10px 0}
.an-prio-item{text-align:center}
.an-prio-ring{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;margin:0 auto 10px;background:conic-gradient(var(--c) calc(var(--pct)*1%),var(--surface-2) 0)}
.an-prio-ring b{width:62px;height:62px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:20px;font-weight:800;color:var(--c)}
.an-prio-item span{font-size:12.5px;font-weight:700;color:var(--ink-600)}
.an-users{display:flex;flex-direction:column;gap:10px}
.an-user{display:flex;align-items:center;gap:12px}
.an-rank{width:26px;height:26px;border-radius:8px;background:var(--surface-2);color:var(--ink-400);display:grid;place-items:center;font-size:12px;font-weight:800;flex-shrink:0}
.an-rank.top{background:var(--amber-soft);color:var(--amber)}
.an-av{width:38px;height:38px;border-radius:11px;color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0}
.an-user-info{width:130px;flex-shrink:0}
.an-user-info b{font-size:13.5px;font-weight:700;display:block}
.an-user-info span{font-size:11px;color:var(--ink-400)}
.an-user-bar{flex:1;height:8px;border-radius:6px;background:var(--surface-2);overflow:hidden}
.an-user-fill{height:100%;border-radius:6px;transition:width .6s}
.an-user-num{font-size:12.5px;font-weight:800;color:var(--ink-600);width:50px;text-align:left;font-family:'IBM Plex Mono',monospace}
.an-states{display:flex;flex-wrap:wrap;gap:12px}
.an-state{flex:1;min-width:110px;background:var(--surface-2);border:1.5px solid var(--line);border-radius:14px;padding:16px;text-align:center}
.an-state b{font-size:26px;font-weight:800;display:block;line-height:1}
.an-state span{font-size:12px;color:var(--ink-400);font-weight:600}

/* الفريق */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.team-card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:20px;transition:all .2s}
.team-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.team-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.team-av{width:48px;height:48px;border-radius:14px;color:#fff;display:grid;place-items:center;font-size:18px;font-weight:700}
.team-info b{font-size:15px;font-weight:800;display:block}
.team-info span{font-size:12px;color:var(--ink-400)}
.team-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.team-stat{text-align:center;background:var(--surface-2);border-radius:11px;padding:10px 4px}
.team-stat b{font-size:18px;font-weight:800;display:block;line-height:1}
.team-stat span{font-size:10.5px;color:var(--ink-400)}
.team-prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12.5px;color:var(--ink-500)}
.team-prog-head b{color:var(--ink-900)}

/* الإشعارات */
.notif-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.notif-list{display:flex;flex-direction:column;gap:10px}
.notif{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:16px 18px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s}
.notif:hover{box-shadow:var(--shadow-md)}
.notif.unread{background:var(--blue-50);border-color:var(--blue-100)}
.notif-ico{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
.notif-body{flex:1}
.notif-body b{font-size:14px;font-weight:800;display:block;margin-bottom:3px}
.notif-body span{font-size:12.5px;color:var(--ink-500)}
.notif-side{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.notif-time{font-size:11px;color:var(--ink-400);font-weight:600}
.notif-dot{width:9px;height:9px;border-radius:50%;background:var(--blue-600)}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--surface);border-top:1px solid var(--line);z-index:90;justify-content:space-around;align-items:center;padding:0 10px;box-shadow:0 -4px 20px rgba(0,0,0,0.05);padding-bottom:env(safe-area-inset-bottom);}
.bn-btn{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink-400);font-size:10px;font-weight:700;position:relative;width:60px;background:none;border:none;cursor:pointer;}
.bn-btn.on{color:var(--blue-600);}
.bn-btn .ico{width:22px;height:22px;}
.bn-badge{position:absolute;top:-4px;right:12px;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:10px;line-height:1;}
@media(max-width:900px){.set-grid,.an-grid,.home-grid{grid-template-columns:1fr}.stat-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .role-switch{display:none}.me-info{display:none}.content{padding:16px;padding-bottom:90px;height:100vh}.bottom-nav{display:flex}
  .sidebar{display:flex;position:fixed;top:0;right:-300px;bottom:0;width:260px;z-index:100;background:var(--surface);box-shadow:-4px 0 24px rgba(0,0,0,0.1);transition:right 0.3s cubic-bezier(0.4, 0, 0.2, 1);padding-bottom:env(safe-area-inset-bottom);border-left:noneoverflow-y: auto; overflow-x: hidden;}
  .sidebar.open{right:0}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;backdrop-filter:blur(3px)}
  .sidebar-overlay.open{display:block}
}
/* ===== تطبيق الزجاجية اللامعة على كل البوكسات ===== */
.stat,.panel,.tmap,.team-card,.notif,.myitem,.flt{
  position:relative;
  background:linear-gradient(150deg,rgba(255,255,255,.95),rgba(247,249,253,.86))!important;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.65)!important;
  box-shadow:0 4px 22px rgba(20,40,90,.06),inset 0 1px 0 rgba(255,255,255,.95)!important;
  overflow:hidden;
}
.stat::before,.panel::before,.tmap::before,.team-card::before,.notif::before,.myitem::before{
  content:"";position:absolute;top:0;left:0;right:0;height:38%;
  background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0));
  pointer-events:none;z-index:0;
}
.stat>*,.team-card>*,.notif>*,.myitem>*{position:relative;z-index:1}
/* لمعان عابر عند المرور على الكروت */
.stat::after,.team-card::after,.myitem::after,.notif::after{
  content:"";position:absolute;top:0;left:-120%;width:75%;height:100%;
  background:linear-gradient(110deg,transparent,rgba(255,255,255,.5),transparent);
  transform:skewX(-18deg);transition:left .7s cubic-bezier(.2,.7,.2,1);pointer-events:none;z-index:3;
}
.stat:hover::after,.team-card:hover::after,.myitem:hover::after,.notif:hover::after{left:135%}
.stat:hover,.team-card:hover,.myitem:hover,.notif:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(20,40,90,.12),inset 0 1px 0 rgba(255,255,255,.95)!important}

/* مربعات النص والحقول — لمسة زجاجية لامعة */
.np-field input,.np-field select,.np-field textarea,
.fld input,.fld select,.fld textarea,
.searchbar,.set-add input,.set-add select,.sb-row select{
  background:linear-gradient(160deg,rgba(255,255,255,.9),rgba(247,249,253,.75))!important;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:inset 0 1px 2px rgba(20,40,90,.04),inset 0 1px 0 rgba(255,255,255,.9);
  transition:all .25s;
}
.np-field input:focus,.np-field textarea:focus,.np-field select:focus,
.fld input:focus,.fld textarea:focus,.fld select:focus{
  background:#fff!important;
  box-shadow:0 0 0 3px rgba(59,111,240,.12),inset 0 1px 0 rgba(255,255,255,.9);
}
/* لوحة العقدة المفتوحة — زجاجية */
.node-panel{background:linear-gradient(150deg,rgba(255,255,255,.92),rgba(244,247,253,.85))!important;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.7)!important;box-shadow:0 8px 30px rgba(20,40,90,.08),inset 0 1px 0 rgba(255,255,255,.9)!important}
/* المودال — زجاجي لامع */
.modal{background:linear-gradient(160deg,rgba(255,255,255,.96),rgba(246,249,253,.92))!important;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.7)}

/* ===== أيقونات SVG عامة ===== */
.ico{flex-shrink:0;vertical-align:middle}
.chip .ico{width:13px;height:13px}
.myitem-top .chip .ico{width:14px;height:14px}
.sb-btn .ico{width:20px;height:20px}
.stat-ico .ico,.act-ico .ico,.notif-ico .ico{width:20px;height:20px}

/* ===== المهام الخاصة (مساحة معزولة) ===== */
.pcard{border-radius:var(--r-lg);padding:22px;margin-bottom:18px;border-right:5px solid var(--violet)}
.pcard-head{margin-bottom:16px}
.pcard-title{display:flex;align-items:flex-start;gap:12px}
.pcard-title .ico{color:var(--violet);margin-top:2px}
.pcard-title b{font-size:17px;font-weight:800;display:block;margin-bottom:4px}
.pcard-title span{font-size:12.5px;color:var(--ink-400);line-height:1.6}
.padd{display:flex;gap:10px;flex-wrap:wrap}
.padd input{flex:1;min-width:160px;height:46px;border:1.5px solid var(--line);border-radius:13px;padding:0 16px;font-size:14px;background:linear-gradient(160deg,rgba(255,255,255,.9),rgba(247,249,253,.75));transition:all .2s}
.padd input:focus{outline:none;border-color:var(--violet);background:#fff}
.padd .pill-blue{background:linear-gradient(135deg,#8B5CF6,#6D28D9);box-shadow:0 10px 26px rgba(124,58,237,.28)}

.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pcol{background:linear-gradient(150deg,rgba(255,255,255,.95),rgba(247,249,253,.86));border:1px solid rgba(255,255,255,.65);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:18px}
.pcol-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:var(--ink-700);margin-bottom:14px}
.pcol-head .ico{color:var(--blue-500)}
.pcol-head.done .ico{color:var(--green-ok)}
.pcol-head em{margin-right:auto;background:var(--surface-2);color:var(--ink-500);font-style:normal;font-size:12px;font-weight:800;min-width:24px;height:24px;padding:0 8px;border-radius:12px;display:grid;place-items:center}
.ptask{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:9px;transition:all .2s}
.ptask:hover{box-shadow:var(--shadow-sm);transform:translateX(-2px)}
.ptask.done{opacity:.65;background:var(--surface-2)}
.ptask.done .ptask-body b{text-decoration:line-through;color:var(--ink-400)}
.ptask-check{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);background:#fff;display:grid;place-items:center;color:#fff;flex-shrink:0;transition:all .2s}
.ptask-check:hover{border-color:var(--violet)}
.ptask-check.on{background:var(--green-ok);border-color:var(--green-ok)}
.ptask-body{flex:1}
.ptask-body b{font-size:14px;font-weight:700;display:block}
.ptask-body span{font-size:12px;color:var(--ink-400);display:block;margin-top:2px}
.ptask-del{width:28px;height:28px;border-radius:8px;background:var(--surface-2);color:var(--ink-400);display:grid;place-items:center;flex-shrink:0;transition:all .2s}
.ptask-del:hover{background:#FF547018;color:var(--red)}
.pempty{text-align:center;color:var(--ink-300);font-size:13px;padding:24px}
@media(max-width:760px){.pgrid{grid-template-columns:1fr}}

/* ===== التقويم التفاعلي ===== */
.cal-wrap{display:grid;grid-template-columns:1fr;gap:16px}
.cal-wrap.has-panel{grid-template-columns:1fr 340px}
.cal-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.cal-month-nav{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:6px;box-shadow:var(--shadow-sm)}
.cal-month-label{text-align:center;min-width:130px}
.cal-month-label b{font-size:17px;font-weight:800;display:block;line-height:1.2}
.cal-navbtn{width:40px;height:40px;border-radius:12px;background:var(--surface-2);border:none;display:grid;place-items:center;color:var(--ink-600);transition:all .2s;cursor:pointer}
.cal-navbtn:hover{background:var(--blue-grad);color:#fff;transform:scale(1.05)}
.cal-navbtn:active{transform:scale(.95)}
.cal-todaybtn{height:36px;padding:0 16px;border-radius:11px;background:var(--blue-50);color:var(--blue-600);font-size:12.5px;font-weight:700;transition:all .2s;margin-right:4px}
.cal-todaybtn:hover{background:var(--blue-grad);color:#fff}
.cal-mcount{font-size:11px;color:var(--ink-400);font-weight:600}
.cal-cell.has-pub{background:linear-gradient(160deg,var(--green-soft),rgba(231,248,241,.4));border-color:rgba(22,185,129,.25)}
.cal-cell.has-pub .cal-dnum{color:var(--green-ok)}
.cal-ev.pub{font-weight:700}
.cal-mcount{font-size:12.5px;color:var(--ink-400);font-weight:600;margin-right:10px}
.cal-grid-card{border-radius:var(--r-lg);padding:18px}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:10px}
.cal-week span{text-align:center;font-size:12px;font-weight:700;color:var(--ink-400)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-cell{position:relative;min-height:92px;border-radius:14px;background:var(--surface-2);border:1.5px solid transparent;padding:8px;cursor:pointer;transition:all .2s;overflow:hidden}
.cal-cell.empty{background:transparent;cursor:default}
.cal-cell:not(.empty):hover{border-color:var(--blue-300);background:#fff;transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.cal-cell.today{background:var(--blue-50);border-color:var(--blue-300)}
.cal-cell.sel{border-color:var(--blue-500);background:#fff;box-shadow:0 8px 22px rgba(37,99,235,.18)}
.cal-cell.has-ev{cursor:pointer}
.cal-dnum{font-size:13px;font-weight:800;color:var(--ink-700)}
.cal-cell.today .cal-dnum{color:var(--blue-600)}
.cal-dots{position:absolute;top:11px;left:8px;display:flex;gap:3px}
.cal-dots i{width:6px;height:6px;border-radius:50%}
.cal-evs{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.cal-ev{font-size:10px;font-weight:600;padding:3px 6px;border-radius:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-more{font-size:9.5px;color:var(--ink-400);font-weight:700;padding-right:3px}
.cal-hint{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-400);margin-top:14px}
.cal-hint .ico{color:var(--blue-500)}

/* لوحة اليوم */
.cal-day-panel{border-radius:var(--r-lg);padding:18px;align-self:start;position:sticky;top:0}
.cdp-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.cdp-head b{font-size:15px;font-weight:800;display:block}
.cdp-head span{font-size:12px;color:var(--ink-400)}
.cdp-list{display:flex;flex-direction:column;gap:12px}
.cdp-item{background:#fff;border:1px solid var(--line);border-right:4px solid var(--c);border-radius:14px;padding:14px}
.cdp-item-head{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.cdp-title{font-size:14px;font-weight:800;display:block;margin-bottom:6px;line-height:1.4}

.chat-wrap{display:grid;grid-template-columns:260px 1fr;gap:16px;height:calc(100vh - 230px);min-height:440px}

.chat-side-head .ico{color:var(--blue-600)}

.chat-head-title{font-size:16px;font-weight:800;display:block}

.chat-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.chat-meta b{font-size:12px;font-weight:800;color:var(--ink-700)}
.chat-meta span{font-size:10.5px;color:var(--ink-400)}
.chat-msg.mine .chat-meta span{color:rgba(255,255,255,.75)}

.chat-input{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line)}
.chat-input input{flex:1;height:46px;border:1.5px solid var(--line);border-radius:13px;padding:0 16px;font-size:14px;background:var(--surface-2);transition:all .2s}

.chat-send{width:46px;height:46px;border-radius:13px;background:var(--blue-grad);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow-blue);transition:transform .2s}
.chat-send:hover{transform:scale(1.05)}

<div id="loginScreen" style="position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="card" style="width:100%;max-width:400px;padding:32px;display:flex;flex-direction:column;gap:20px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.1);">
    <h1 style="color:var(--blue-600);margin:0;font-size:28px;">Mirmaz Flow</h1>
    <p style="color:var(--ink-500);margin:0">تسجيل الدخول للمنظومة</p>
    <div id="loginError" style="color:var(--red);font-size:14px;display:none;">بيانات الدخول غير صحيحة</div>
    <div style="display:flex;flex-direction:column;gap:12px;text-align:right;">
      <label style="font-weight:bold;color:var(--ink-700)">اسم المستخدم</label>
      <input type="text" id="loginUser" class="tmap-in" placeholder="Username" style="padding:12px;font-size:16px;">
      
      <label style="font-weight:bold;color:var(--ink-700)">كلمة المرور</label>
      <div style="position:relative;display:flex;align-items:center;">
        <input type="password" id="loginPass" class="tmap-in" placeholder="Password" style="padding:12px;font-size:16px;width:100%;">
        <button onclick="togglePassword()" style="position:absolute;left:10px;background:none;border:none;color:var(--ink-500);cursor:pointer;padding:5px;">👁</button>
      </div>
    </div>
    <button class="pill-blue" onclick="performLogin()" style="padding:14px;font-size:16px;margin-top:10px;">تسجيل الدخول</button>
  </div>
</div>
<script>
function togglePassword(){
  const p=document.getElementById('loginPass');
  p.type = p.type==='password'?'text':'password';
}
function performLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  const user = store.team.find(x => (x.user||x.id) === u && (x.pass||'1234') === p);
  if(user){
    localStorage.setItem('mirmaz_session', user.id);
    store.currentUser = user.id;
    document.getElementById('loginScreen').style.display='none';
    document.querySelector('.shell').style.display='flex';
    render();
  } else {
    document.getElementById('loginError').style.display='block';
  }
}
function logout(){
  localStorage.removeItem('mirmaz_session');
  location.reload();
}
</script>

function getApprStyle(val) {
  if (val === 'Approved') return 'background:var(--green-soft);color:var(--green-ok);';
  if (val === 'Rejected') return 'background:var(--red-soft);color:var(--red);';
  if (val === 'Hold') return 'background:var(--amber-soft);color:var(--amber);';
  if (val === 'FALSE') return 'background:var(--surface-2);color:var(--ink-700);';
  return 'background:var(--line);color:var(--ink-900);';
}

const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// تأمين الروابط: يمنع javascript:/data:/vbscript: ويسمح فقط http/https
function safeUrl(u){u=String(u||'').trim();if(!u)return '#';const low=u.toLowerCase();
  if(low.startsWith('javascript:')||low.startsWith('data:')||low.startsWith('vbscript:')||low.startsWith('file:'))return '#';
  if(/^https?:\/\//i.test(u))return esc(u);
  if(/^[\w.-]+\.[a-z]{2,}/i.test(u))return esc('https://'+u);
  return '#';}

function nodeCard(task,st,idx){
  const k=(STAGE_KINDS[st.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true}),person=st.person?userById(st.person):null,ns=NSTATE[st.state]||{ar:'غير معروف',color:'#999',svg:'dot'};
  const opened=openNode[task.id]===st.id;
  const prevDone=idx>0?['done','approved'].includes(task.stages[idx-1].state):true;
  // تحديد حالة الدائرة بصرياً
  const isDone=['done','approved'].includes(st.state);
  const isRejected=st.state==='rejected';
  // الجاري = أول مرحلة غير منجزة (working أو approval أو أول pending بعد منجز)
  const firstActiveIdx=task.stages.findIndex(s=>!['done','approved'].includes(s.state)&&s.state!=='rejected');
  const isActiveStage=(st.state==='working'||st.state==='approval')||(idx===firstActiveIdx&&!isRejected);
  let cls='pending';
  if(isRejected)cls='rejected';
  else if(isDone)cls='done';
  else if(isActiveStage)cls='active-stage';
  return `<div class="cnode ${cls} ${opened?'opened':''}" style="--c:${k.color}">
    <div class="cnode-line before ${prevDone?'done':''}"></div>
    <div class="cnode-line after ${isDone?'done':''}"></div>
    <div class="cnode-circle" onclick="toggleNode('${task.id}','${st.id}')" title="${k.ar}">
      <span class="cn-ico">${icon(k.svg,27)}</span>
      <span class="cn-state" style="background:${ns.color}">${icon(ns.svg,12)}</span>
    </div>
    <div class="cnode-label">
      <div class="cnode-name">${k.ar}</div>
      ${person?`<div class="cnode-person"><i class="cn-av" style="background:${person.av}">${person.name[0]}</i> ${esc(person.name)}</div>`:`<div class="cnode-noperson">لم يُعيَّن</div>`}
    </div>
  </div>`;
}
function nodePanel(task,st){
  const k=(STAGE_KINDS[st.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true}),u=store.currentUser;
  const isOwner=st.person===u,isCoord=task.coordinator===u||userById(u).role==='مانيجر',isAdmin=userById(u).role==='الإدارة';
  const canEdit=isOwner||isCoord;
  let inner='';
  // تنبيه إعادة التدقيق على مرحلتي المراجعة والموافقة
  const needsRecheck=task.stages.some(s=>s._needsRecheck);
  if(needsRecheck&&(k.ar.includes('مراجعة')||k.isApproval)){
    inner+=`<div class="recheck-banner">${icon('clock',15)} حدث تعديل على محتوى سابق — يجب إعادة التدقيق ثم طلب الموافقة من جديد.</div>`;
  }
  if(k.isApproval){
    if(st.state==='approved')inner=`<div class="np-content" style="color:var(--green-ok)">✓ تمت الموافقة — انتقلت المهمة لمرحلة النشر.</div>`;

      inner=`<div class="np-reject"><label>سبب الرفض</label><div class="np-content" style="margin-top:8px;color:var(--red)">${esc(st.reason||'—')}</div></div>`;

    }
    else{inner=`<div class="np-content">بانتظار موافقة الإدارة بعد اكتمال المراجعة.</div>`;
      if(isAdmin)inner+=`<div class="np-actions"><button class="btn-sm btn-green" onclick="approveNode('${task.id}','${st.id}')">✓ موافقة</button><button class="btn-sm btn-red" onclick="rejectNode('${task.id}','${st.id}')">✕ رفض (مع السبب)</button></div>`;
      else inner+=`<p style="font-size:12px;color:var(--ink-400);margin-top:8px">الموافقة من صلاحية الإدارة فقط.</p>`;}

          ${captionLink?`<a class="deliver-link" href="${safeUrl(captionLink)}" target="_blank" rel="noopener noreferrer"><span class="deliver-info"><b>رابط الكابشن</b></span><span class="deliver-go">${icon('publish',13)} فتح</span></a>`:''}

      inner=ready+sched;

        inner+=`<div class="np-actions">

          <button class="btn-sm btn-green" onclick="markPublished('${task.id}','${st.id}')">${icon('check',14)} تم النشر</button>

function reschedule(tid,sid){
  const t=store.tasks.find(x=>x.id===tid),st=t.stages.find(s=>s.id===sid);
  const nd=prompt('تأجيل النشر إلى تاريخ آخر (YYYY-MM-DD):',st.publishDate);
  if(nd&&/^\d{4}-\d{2}-\d{2}$/.test(nd)){st.publishDate=nd;addNotif('deadline','تم تأجيل النشر','"'+t.title+'" → '+nd);save();
    const day=parseInt(nd.split('-')[2]);if(nd.startsWith('2026-06'))calSelDay=day;render();}
  else if(nd!==null)alert('صيغة التاريخ غير صحيحة. استخدم YYYY-MM-DD');

function addEventOnDay(ds){
  // إنشاء تاسك مبسّط بمرحلة نشر في هذا اليوم
  const title=prompt('اسم المنشور / المهمة:');if(!title||!title.trim())return;
  const link=prompt('رابط المنشور (اختياري):')||'';
  const task={id:'t'+Date.now(),brand:'academy',title:title.trim(),desc:'أُضيف من التقويم',due:ds,priority:'normal',coordinator:store.currentUser,coordNote:'',coordLink:'',
    stages:[{id:'s1',kind:'publish',person:store.currentUser,state:'working',text:'',note:link,link:link,publishDate:ds}]};
  store.tasks.unshift(task);addNotif('assign','منشور جديد بالتقويم',title.trim()+' — '+ds);save();
  const day=parseInt(ds.split('-')[2]);if(ds.startsWith('2026-06'))calSelDay=day;render();
}
function viewAnalytics(){
  const tasks=getVisibleTasks();
  // إحصائيات حسب البراند
  const byBrand={academy:{total:0,done:0},zone:{total:0,done:0}};
  // إحصائيات حسب الموظف
  const byUser={};store.team.forEach(u=>byUser[u.id]={total:0,done:0});
  // توزيع الأولويات
  const byPrio={normal:0,medium:0,critical:0};
  tasks.forEach(t=>{
    byBrand[t.brand].total++;byPrio[t.priority]++;
    const allDone=t.stages.every(s=>['done','approved'].includes(s.state));
    if(allDone)byBrand[t.brand].done++;
    t.stages.forEach(st=>{if(st.person&&byUser[st.person]){byUser[st.person].total++;if(['done','approved'].includes(st.state))byUser[st.person].done++;}});
  });
  // أكثر الموظفين إنتاجاً
  const topUsers=store.team.map(u=>({u,...byUser[u.id]})).filter(x=>x.total>0).sort((a,b)=>b.done-a.done);
  const maxDone=Math.max(...topUsers.map(x=>x.done),1);
  // حالات المهام
  const stateCount={};Object.keys(NSTATE).forEach(k=>stateCount[k]=0);
  tasks.forEach(t=>t.stages.forEach(s=>stateCount[s.state]++));

  return `<div class="an-grid">

      <div class="an-prio">${Object.entries(byPrio).map(([k,v])=>{const p=PRIORITIES[k];const tot=tasks.length||1;
        return `<div class="an-prio-item"><div class="an-prio-ring" style="--c:${p.color};--pct:${v/tot*100}"><b>${v}</b></div><span>${p.emoji} ${p.name}</span></div>`;}).join('')}</div>
    </div>
  </div>
  <div class="panel fade-up" style="margin-bottom:16px">
    <div class="panel-head"><h3>أكثر الموظفين إنتاجاً</h3><span class="more">${topUsers.length} موظف نشط</span></div>
    <div class="an-users">${topUsers.map((x,i)=>`<div class="an-user">
      <span class="an-rank ${i<3?'top':''}">${i+1}</span>
      <span class="an-av" style="background:${x.u.av}">${x.u.name[0]}</span>
      <div class="an-user-info"><b>${esc(x.u.name)}</b><span>${esc(x.u.role)}</span></div>
      <div class="an-user-bar"><div class="an-user-fill" style="width:${x.done/maxDone*100}%;background:${x.u.av}"></div></div>
      <span class="an-user-num">${x.done}/${x.total}</span>
    </div>`).join('')}</div>
  </div>
  <div class="panel fade-up">
    <div class="panel-head"><h3>حالات المراحل</h3></div>
    <div class="an-states">${Object.entries(stateCount).filter(([,v])=>v>0).map(([k,v])=>{const ns=NSTATE[k];
      return `<div class="an-state" style="border-color:${ns.color}33"><b style="color:${ns.color}">${v}</b><span>${ns.ar}</span></div>`;}).join('')}</div>

function toggleNode(tid,sid){openNode[tid]=openNode[tid]===sid?null:sid;render();}
function closeNode(tid){openNode[tid]=null;render();}
function findStage(tid,sid){const t=store.tasks.find(x=>x.id===tid);return[t,t.stages.find(s=>s.id===sid)];}
function setNodeField(tid,sid,f,v){
  const[t,st]=findStage(tid,sid);
  const oldVal=st[f]||'';
  if(oldVal===v)return; // لا تغيير فعلي
  st[f]=v;
  // إعادة التدقيق: لو حصل تعديل على مرحلة عمل (كابشن/تصميم...) ومرّت المراحل التالية بالمراجعة/الموافقة/النشر، رجّعها للانتظار
  const k=(STAGE_KINDS[st.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true});
  if(!k.isApproval&&!k.isPublish){
    const idx=t.stages.findIndex(s=>s.id===sid);
    let reverted=false;
    for(let i=idx+1;i<t.stages.length;i++){
      const ns=t.stages[i],nk=(STAGE_KINDS[ns.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true});
      // المراحل التي تحتاج إعادة بعد التعديل: المراجعة، الموافقة، النشر
      if((nk.ar.includes('مراجعة')||nk.isApproval||nk.isPublish)&&['done','approved','approval','published','working'].includes(ns.state)){
        ns.state='pending';if(nk.isApproval)ns.reason='';reverted=true;
      }
    }
    // إعادة المرحلة المعدّلة نفسها لقيد العمل إن كانت منجزة
    if(['done','approved'].includes(st.state))st.state='working';
    if(reverted){st._needsRecheck=true;addNotif('critical','يتطلب إعادة تدقيق','تم تعديل «'+k.ar+'» في "'+t.title+'" — أُعيدت المراجعة والموافقة');}
  }
  save();
  if((STAGE_KINDS[st.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true}) && (document.querySelector('.node-panel')))render();
}

function nowStamp(){const d=new Date();const D=String(d.getDate()).padStart(2,'0'),M=String(d.getMonth()+1).padStart(2,'0'),h=String(d.getHours()).padStart(2,'0'),m=String(d.getMinutes()).padStart(2,'0');return `${d.getFullYear()}-${M}-${D} ${h}:${m}`;}
function startEdit(tid,sid){openEdit[tid+'_'+sid]=true;render();}
function cancelEdit(tid,sid){delete openEdit[tid+'_'+sid];render();}
function stageEdit(tid,sid,f,v){const[,st]=findStage(tid,sid);st['_draft_'+f]=v;} // مسوّدة مؤقتة
function saveEdit(tid,sid){
  const[t,st]=findStage(tid,sid);const k=(STAGE_KINDS[st.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true});
  // طبّق المسودّات
  let changed=false;
  ['text','note','link'].forEach(f=>{if(st['_draft_'+f]!==undefined){if(st[f]!==st['_draft_'+f])changed=true;st[f]=st['_draft_'+f];delete st['_draft_'+f];}});
  // سجّل من عدّل ومتى
  st.lastEditBy=store.currentUser;st.lastEditAt=nowStamp();
  st.state='working';
  // أعِد كل المراحل التالية (مراجعة/موافقة/نشر) للانتظار
  const idx=t.stages.findIndex(s=>s.id===sid);let reverted=false;
  for(let i=idx+1;i<t.stages.length;i++){const ns=t.stages[i],nk=(STAGE_KINDS[ns.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true});
    if((nk.ar.includes('مراجعة')||nk.isApproval||nk.isPublish)&&['done','approved','approval','published','working','rejected'].includes(ns.state)){
      ns.state='pending';if(nk.isApproval)ns.reason='';reverted=true;}}
  if(reverted)t.stages.forEach(s=>{if((STAGE_KINDS[s.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true}).ar.includes('مراجعة')||(STAGE_KINDS[s.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true}).isApproval)s._needsRecheck=true;});
  addNotif('critical','تعديل يتطلب إعادة تدقيق',userById(store.currentUser).name+' عدّل «'+k.ar+'» في "'+t.title+'" — أُعيدت للتدقيق ثم موافقة الإدارة');
  delete openEdit[tid+'_'+sid];save();render();
}
function setNodeState(tid,sid,state){const[t,st]=findStage(tid,sid);st.state=state;if(state==='done'&&st.kind==='review'){const ap=t.stages.find(s=>(STAGE_KINDS[s.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true}).isApproval);if(ap&&ap.state==='pending')ap.state='approval';t.stages.forEach(s=>s._needsRecheck=false);}save();render();}
function addNotif(type,title,body){if(!store.notifications)store.notifications=[];store.notifications.unshift({id:'n'+Date.now(),type,title,body,time:'الآن',read:false});}
function approveNode(tid,sid){const[t,st]=findStage(tid,sid);st.state='approved';const pub=t.stages.find(s=>(STAGE_KINDS[s.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true}).isPublish);if(pub)pub.state='working';addNotif('done','تمت الموافقة','تمت الموافقة على "'+t.title+'" — انتقلت للنشر');save();render();}
function rejectNode(tid,sid){const reason=prompt('سبب الرفض:');if(reason===null)return;const[t,st]=findStage(tid,sid);st.state='rejected';st.reason=reason;addNotif('critical','تم رفض المهمة','"'+t.title+'": '+reason);save();render();}
function setPublishDate(tid,sid,v){const[,st]=findStage(tid,sid);st.publishDate=v;save();render();}
function copyText(btn,txt){const v=txt!==undefined?txt:(btn.getAttribute('data-copy')||'');if(navigator.clipboard)navigator.clipboard.writeText(v);const o=btn.innerHTML;btn.innerHTML='✓ نُسخ';setTimeout(()=>{btn.innerHTML=o;},1500);}
// ===== مشاركة المهمة =====
function shareTask(tid,sid){
  const t=store.tasks.find(x=>x.id===tid);const b=(BRANDS[t.brand]||{name:'غير معروف',bg:'#eee',c:'#333'});
  const shareUrl=location.origin+location.pathname+'#task='+tid+(sid?('/'+sid):'');
  const summary=`📋 ${t.title}\n${b.emoji} ${b.name} · ⏱ ${t.due}\n${t.desc||''}\n🔗 ${shareUrl}`;
  document.getElementById('modalRoot').innerHTML=`<div class="ov" onclick="if(event.target===this)closeShare()"><div class="modal" style="max-width:480px">
    <div class="modal-head"><h2>مشاركة المهمة</h2><button class="modal-close" onclick="closeShare()">✕</button></div>
    <div class="modal-body">
      <div class="share-card" style="--c:${b.color}">
        <div class="share-chips"><span class="chip" style="background:${b.soft};color:${b.color}">${b.emoji} ${b.name}</span><span class="chip" style="background:var(--surface-2);color:var(--ink-500)">⏱ ${t.due}</span></div>
        <b class="share-title">${esc(t.title)}</b>
        <p class="share-desc">${esc(t.desc||'')}</p>
      </div>
      <div class="share-link-box">
        <input id="shareUrl" value="${shareUrl}" readonly>
        <button class="btn-sm btn-blue" onclick="copyText(this,document.getElementById('shareUrl').value)">${icon('link',14)} نسخ الرابط</button>
      </div>
      <div class="share-actions">
        <button class="share-btn teams" onclick="shareToTeams('${tid}')">${icon('teams',16)} مشاركة في تيمز</button>
        <button class="share-btn jump" onclick="closeShare();openFromMy('${tid}','${sid||t.stages[0].id}')">${icon('maps',16)} الذهاب للمهمة في الخريطة</button>
        <button class="share-btn copy" data-copy="${esc(summary)}" onclick="copyText(this)">${icon('doc',16)} نسخ ملخّص المهمة</button>
      </div>
    </div>
  </div></div>`;
}
function closeShare(){document.getElementById('modalRoot').innerHTML='';}
function shareToTeams(tid){
  const t=store.tasks.find(x=>x.id===tid);
  // في الباكند: يُرسل فعلياً عبر Microsoft Graph API لقناة تيمز
  addNotif('assign','مشاركة في تيمز','تمت مشاركة "'+t.title+'" في قناة الفريق بتيمز (تجريبي — يُفعّل بالباكند)');
  alert('سيتم إرسال المهمة لقناة تيمز عبر Microsoft Graph API بعد ربط الباكند.\n\nالمهمة: '+t.title);
  closeShare();save();render();
}
function setPublishing(tid,sid){const[t,st]=findStage(tid,sid);st._publishing=true;st.state='working';addNotif('assign','جاري النشر','"'+t.title+'" قيد النشر الآن');save();render();}
function markPublished(tid,sid){const[t,st]=findStage(tid,sid);st.state='published';st._publishing=false;if(!st.publishDate)st.publishDate='2026-06-21';addNotif('done','تم النشر','"'+t.title+'" تم نشره بنجاح');save();render();}
function postponeTask(tid){const t=store.tasks.find(x=>x.id===tid);const d=prompt('تأجيل المهمة إلى تاريخ (YYYY-MM-DD):',t.due);if(d){t.due=d;save();render();}}
function addTeam(){const n=document.getElementById('newName').value.trim(),r=document.getElementById('newRole').value;if(!n)return;const colors=['#1E5BFF','#8B5CF6','#21C07A','#F6A609','#FF5470','#22A7F0','#0FB67E'];store.team.push({id:'u'+Date.now(),name:n,role:r,av:colors[store.team.length%colors.length]});save();render();}
function delTeam(id){if(store.team.length<=1)return;store.team=store.team.filter(u=>u.id!==id);save();render();}
function addSection(){const s=document.getElementById('newSection').value;if(!s||!STAGE_KINDS[s])return;if(!store.sections.includes(s))store.sections.push(s);save();render();}
function delSection(i){store.sections.splice(i,1);save();render();}

let tForm=null,tEditId=null;
function openTaskModal(editId, isPartnership = false){
  tEditId=editId||null;
  if(editId){
    const t=store.tasks.find(x=>x.id===editId);
    const pSt=t.stages.find(s=>(STAGE_KINDS[s.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true})&&(STAGE_KINDS[s.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true}).isPublish);
    tForm={brand:t.brand,priority:t.priority,title:t.title,desc:t.desc,due:t.due,pubDate:pSt?pSt.publishDate||'':'',coordNote:t.coordNote||'',coordLink:t.coordLink||'',
      isPartnership: t.isPartnership,
      stages:t.stages.map(s=>({...s}))};
  }else{
    tForm={brand:'academy',priority:'normal',title:'',desc:'',due:'2026-06-28',pubDate:'',coordNote:'',coordLink:'',
      isPartnership,
      stages:store.sections.map((kind,i)=>({id:'s'+(i+1),kind,person:'',state:'pending',text:'',note:'',link:'',reason:'',publishDate:''}))};
  }
  renderTaskModal();
}
function closeTaskModal(){document.getElementById('modalRoot').innerHTML='';tForm=null;tEditId=null;}
function tf(k,v){tForm[k]=v;}
function tStagePerson(i,v){tForm.stages[i].person=v;}
function tStageKind(i,v){tForm.stages[i].kind=v;renderTaskModal();}
function tAddStage(){tForm.stages.push({id:'s'+Date.now(),kind:store.sections[0]||'caption',person:'',state:'pending',text:'',note:'',link:'',reason:'',publishDate:''});renderTaskModal();}
function tDelStage(i){tForm.stages.splice(i,1);renderTaskModal();}
function tSubmit(){
  const title=document.getElementById('tk_title').value.trim()||'تاسك جديد';
  const desc=document.getElementById('tk_desc').value.trim();
  const due=document.getElementById('tk_due').value;
  const pubDate=document.getElementById('tk_pub')?document.getElementById('tk_pub').value:'';
  const coordNote=document.getElementById('tk_note').value.trim();
  const coordLink=document.getElementById('tk_link').value.trim();
  
  tForm.stages.forEach(st => {
    if((STAGE_KINDS[st.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true}) && (STAGE_KINDS[st.kind]||{ar:'غير معروف',svg:'doc',color:'#999',hasText:true}).isPublish) st.publishDate = pubDate;
  });

  if(tEditId){
    // تعديل مهمة قائمة — احتفظ بحالات المراحل الموجودة
    const t=store.tasks.find(x=>x.id===tEditId);
    t.brand=tForm.brand;t.title=title;t.desc=desc;t.due=due;t.priority=tForm.priority;t.coordNote=coordNote;t.coordLink=coordLink;t.stages=tForm.stages;
    addNotif('assign','تم تعديل المهمة',title+' — تم تحديث بياناتها');
  }else{
    const task={id:'t'+Date.now(),brand:tForm.brand,title,desc,due,priority:tForm.priority,coordinator:store.currentUser,coordNote,coordLink,stages:tForm.stages,isPartnership:tForm.isPartnership};
    store.tasks.unshift(task);
    addNotif(tForm.priority==='critical'?'critical':'assign',tForm.priority==='critical'?'مهمة قصوى جديدة':'تاسك جديد',title+' — '+BRANDS[tForm.brand].name);
  }
  save();closeTaskModal();page='maps';searchQuery='';render();
}
function deleteTask(tid){
  const t=store.tasks.find(x=>x.id===tid);
  if(!confirm('حذف المهمة "'+t.title+'" نهائياً؟ لا يمكن التراجع.'))return;
  store.tasks=store.tasks.filter(x=>x.id!==tid);delete openNode[tid];save();render();
}
function renderTaskModal(){
  const allKinds=Object.entries(STAGE_KINDS);
  const isEdit=!!tEditId;
  document.getElementById('modalRoot').innerHTML=`<div class="ov" onclick="if(event.target===this)closeTaskModal()"><div class="modal">
    <div class="modal-head"><h2>${isEdit?'تعديل المهمة':'إنشاء تاسك جديد + خريطته'}</h2><button class="modal-close" onclick="closeTaskModal()">✕</button></div>
    <div class="modal-body">
      <div class="fld-row">
        <div class="fld"><label>الجهة (البراند)</label><select onchange="tf('brand',this.value)">${Object.values(BRANDS).map(b=>`<option value="${b.id}" ${tForm.brand===b.id?'selected':''}>${b.emoji} ${b.name}</option>`).join('')}</select></div>
        <div class="fld"><label>الأولوية</label><select onchange="tf('priority',this.value)">${Object.values(PRIORITIES).map(p=>`<option value="${p.id}" ${tForm.priority===p.id?'selected':''}>${p.emoji} ${p.name}</option>`).join('')}</select></div>
      </div>
      <div class="fld"><label>عنوان التاسك</label><input id="tk_title" value="${esc(tForm.title)}" placeholder="مثال: ريل العودة للمدارس"></div>
      <div class="fld"><label>تفاصيل التاسك</label><textarea id="tk_desc" placeholder="وصف موجز للمطلوب">${esc(tForm.desc)}</textarea></div>
      <div class="fld-row">
        <div class="fld"><label>الدد لاين</label><input id="tk_due" type="date" value="${tForm.due}"></div>
        <div class="fld"><label>موعد النشر (اختياري)</label><input id="tk_pub" type="date" value="${tForm.pubDate||''}"></div>
      </div>
      <div class="fld"><label>ملاحظة الكوردنيتر (اختياري)</label><textarea id="tk_note" placeholder="توجيهات للفريق">${esc(tForm.coordNote)}</textarea></div>
      <div class="fld"><label>رابط مرجعي (اختياري)</label><input id="tk_link" value="${esc(tForm.coordLink)}" placeholder="drive.google.com/..."></div>
      <div class="stage-builder">
        <div class="sb-title">🧩 مراحل الخريطة — اختر القسم والشخص لكل مرحلة</div>
        <div class="sb-list">${tForm.stages.map((st,i)=>`<div class="sb-row"><span class="sb-num">${i+1}</span>
          <select onchange="tStageKind(${i},this.value)">${allKinds.map(([k,v])=>`<option value="${k}" ${st.kind===k?'selected':''}>${v.ar}</option>`).join('')}</select>
          <select onchange="tStagePerson(${i},this.value)"><option value="">— اختر الشخص —</option>${store.team.map(u=>`<option value="${u.id}" ${st.person===u.id?'selected':''}>${esc(u.name)} (${u.role})</option>`).join('')}</select>
          <button class="sb-del" onclick="tDelStage(${i})">${icon("cross",15)}</button></div>`).join('')}</div>
        <button class="sb-add" onclick="tAddStage()">+ إضافة مرحلة</button>
      </div>
    </div>
    <div class="modal-foot"><span style="font-size:12px;color:var(--ink-400)">${tForm.stages.length} مراحل</span><button class="pill-blue" onclick="tSubmit()">${isEdit?'✓ حفظ التعديلات':'✓ إنشاء التاسك وخريطته'}</button></div>
  </div></div>`;
}
const META={home:['لوحة التحكم 👋','مرحباً، إليك نظرة عامة على أداء الإنتاج اليوم'],maps:['خرائط المهام','كل تاسك خريطته الخاصة — اضغط أي مرحلة لفتحها وإضافة محتواها'],partnerships:['الشراكات','المهام المخصصة للشركات الخارجية وشركاء مرماز'],sheet:['الشيت 📋','جدول المهام والتفاصيل الخاصة للأساتذة'],mytasks:['مهامي','المراحل المعيّنة لك عبر كل المهام'],personal:['مهامي الخاصة','مساحة شخصية معزولة — يراها صاحبها فقط'],calendar:['تقويم النشر','مواعيد النشر تتزامن تلقائياً من خرائط المهام'],chat:['المحادثة','دردشة الفريق مدعومة بـ Microsoft Teams — مشفّرة وآمنة'],analytics:['التقارير والتحليلات','أداء الفريق والإنتاج حسب الجهة والأولوية'],team:['الفريق','كل موظف وإحصائياته ومهامه'],notifications:['الإشعارات','آخر التنبيهات والتحديثات'],settings:['إعدادات المانيجر','إدارة الموظفين والأقسام المتاحة']};
function render(){renderNav();
  if(!store.currentUser) {
    document.querySelector('.shell').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    return;
  } else {
    document.querySelector('.shell').style.display = 'flex';
    const ls = document.getElementById('loginScreen');
    if(ls) ls.style.display = 'none';
  }
renderSummary();
  const unread=store.notifications?store.notifications.filter(n=>!n.read).length:0;
  const bd=document.getElementById('bellDot');if(bd){if(unread){bd.textContent=unread;bd.style.display='grid';}else bd.style.display='none';}
  document.getElementById('pageTitle').textContent=META[page][0];document.getElementById('pageSub').textContent=META[page][1];const v=document.getElementById('view');if(page==='home')v.innerHTML=viewHome();else if(page==='maps')v.innerHTML=viewMaps();else if(page==='partnerships')v.innerHTML=viewPartnerships();else if(page==='sheet')v.innerHTML=viewSheet();else if(page==='mytasks')v.innerHTML=viewMyTasks();else if(page==='personal')v.innerHTML=viewPersonal();else if(page==='calendar')v.innerHTML=viewCalendar();else if(page==='chat')v.innerHTML=viewChat();else if(page==='analytics')v.innerHTML=viewAnalytics();else if(page==='team')v.innerHTML=viewTeam();else if(page==='notifications')v.innerHTML=viewNotifications();else if(page==='settings')v.innerHTML=viewSettings();}
render();
</script>
</body>
</html>
